<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>S² × ℝ Engine — 3D Prototype</title>
<style>
    html, body {
        margin: 0; padding: 0; height: 100%;
        background: #050608; color: #e8eaef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
    }
    body { display: flex; flex-direction: column; }
    #panels { flex: 1 1 auto; display: flex; min-height: 0; }
    .panel { flex: 1 1 50%; position: relative; border-left: 1px solid #1a1d23; }
    .panel:first-child { border-left: none; }
    canvas { display: block; width: 100%; height: 100%; }
    #intrinsicCanvas { background: linear-gradient(to bottom, #3a6ea5 0%, #9bc4e2 100%); }
    #extrinsicCanvas { background: radial-gradient(circle at center, #0e1218 0%, #050608 90%); }

    /* Floating glass panels embedded in each view. */
    .hud {
        position: absolute;
        background: rgba(15, 18, 24, 0.62);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        padding: 10px 14px;
        color: #e8eaef;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        user-select: none;
        box-shadow: 0 6px 28px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
    }
    .hud .row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
    .hud .row.buttons { justify-content: flex-end; gap: 6px; margin-top: 2px; }
    .hud .row .label { width: 60px; color: #94a3b8; font-size: 12px; letter-spacing: 0.01em; }
    .hud .row .value {
        min-width: 44px; text-align: right;
        font-variant-numeric: tabular-nums;
        color: #e8eaef; font-size: 12px;
    }

    /* Buttons */
    .hud button, button.ghost {
        background: rgba(255, 255, 255, 0.06);
        color: #e8eaef;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 4px 11px;
        font: 12px/1.2 -apple-system, system-ui, sans-serif;
        cursor: pointer;
        transition: background 120ms, border-color 120ms;
    }
    .hud button:hover, button.ghost:hover {
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.22);
    }
    .hud button:active { background: rgba(255, 255, 255, 0.20); }

    /* Custom range slider */
    input[type="range"].slider {
        -webkit-appearance: none; appearance: none;
        flex: 1 1 auto; min-width: 110px;
        height: 18px; background: transparent;
        cursor: pointer;
    }
    input[type="range"].slider:disabled { opacity: 0.4; cursor: default; }
    input[type="range"].slider::-webkit-slider-runnable-track {
        height: 3px; background: rgba(255, 255, 255, 0.16);
        border-radius: 2px;
    }
    input[type="range"].slider::-moz-range-track {
        height: 3px; background: rgba(255, 255, 255, 0.16);
        border-radius: 2px; border: 0;
    }
    input[type="range"].slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 14px; height: 14px; margin-top: -5.5px;
        background: #f8fafc; border-radius: 50%;
        cursor: pointer; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
    }
    input[type="range"].slider::-moz-range-thumb {
        width: 14px; height: 14px;
        background: #f8fafc; border: 0; border-radius: 50%;
        cursor: pointer; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
    }

    /* Specific panel placements */
    #hudCoords {
        top: 14px; left: 14px;
        font-variant-numeric: tabular-nums;
        font-size: 14px; padding: 8px 14px;
        letter-spacing: 0.02em;
    }
    #hudCoords .axis { color: #94a3b8; margin-right: 4px; font-size: 11px; }
    #hudCoords .sep { display: inline-block; width: 14px; }

    #hudHelp, #hudControls {
        bottom: 14px;
        font-size: 11.5px;
        padding: 8px 12px;
        opacity: 0.92;
    }
    #hudHelp { left: 14px; }
    #hudControls { right: 14px; }
    .key-row { display: flex; align-items: center; gap: 9px; margin: 3px 0; }
    .key-row .keys {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10.5px;
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 4px;
        padding: 1px 7px;
        min-width: 32px;
        text-align: center;
        letter-spacing: 0.02em;
    }

    #hudSettings {
        top: 14px; right: 14px;
        min-width: 248px;
    }
    #hudSettings .heading {
        font-size: 11px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 2px 0 6px;
        font-weight: 600;
    }

    #hudSelection {
        bottom: 14px; left: 14px;
        background: rgba(255, 224, 90, 0.12);
        border-color: rgba(255, 224, 90, 0.35);
        color: #ffe05a;
        font-size: 12px;
        padding: 7px 12px;
    }
    #hudSelection .name { color: #fff5b8; font-weight: 600; }
    #hudSelection .hint { color: rgba(255, 224, 90, 0.65); margin-left: 8px; font-size: 11px; }

    #fullscreenBtn {
        position: fixed; right: 14px; bottom: 14px;
        width: 30px; height: 30px;
        padding: 0; border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(15, 18, 24, 0.62);
        backdrop-filter: blur(16px);
        color: rgba(255, 255, 255, 0.55);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s ease;
        z-index: 10;
    }
    #fullscreenBtn:hover {
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.95);
        border-color: rgba(255, 255, 255, 0.2);
    }
    #fullscreenBtn svg { width: 16px; height: 16px; }
</style>

<body>
<div id="panels">
    <div class="panel">
        <canvas id="intrinsicCanvas"></canvas>
        <div class="hud" id="hudCoords">
            <span class="axis">θ</span><span id="coordsTheta">0.0</span>°<span class="sep"></span><span class="axis">φ</span><span id="coordsPhi">0.0</span>°
        </div>
        <div class="hud" id="hudHelp">
            <div class="key-row"><span class="keys">WASD</span><span>move</span></div>
            <div class="key-row"><span class="keys">Space</span><span>jump</span></div>
            <div class="key-row"><span class="keys">Mouse</span><span>aim camera</span></div>
            <div class="key-row"><span class="keys">Wheel</span><span>zoom</span></div>
        </div>
    </div>
    <div class="panel">
        <canvas id="extrinsicCanvas"></canvas>
        <div class="hud" id="hudSettings">
            <div class="heading">World</div>
            <div class="row">
                <span class="label">Radius</span>
                <input id="rSlider" type="range" min="100" max="2000" value="500" class="slider" disabled>
                <span class="value" id="rValue">500</span>
            </div>
            <div class="row">
                <span class="label">View dist.</span>
                <input id="farSlider" type="range" min="200" max="15000" value="4000" step="50" class="slider" disabled>
                <span class="value" id="farValue">4000</span>
            </div>
            <div class="row buttons">
                <button id="farHalfBtn" title="View distance = πR (the antipode)">½ lap</button>
                <button id="farFullBtn" title="View distance = 2πR (one full lap)">1 lap</button>
            </div>
            <div class="row">
                <span class="label">Walker h</span>
                <input id="walkerHSlider" type="range" min="0" max="400" value="0" step="1" class="slider" disabled>
                <span class="value" id="walkerHValue">0</span>
            </div>
        </div>
        <div class="hud" id="hudControls">
            <div class="key-row"><span class="keys">LMB</span><span>orbit / pick</span></div>
            <div class="key-row"><span class="keys">MMB</span><span>pan</span></div>
            <div class="key-row"><span class="keys">RMB</span><span>look</span></div>
            <div class="key-row"><span class="keys">Wheel</span><span>zoom</span></div>
            <div class="key-row"><span class="keys">F</span><span>focus selection</span></div>
        </div>
        <div class="hud" id="hudSelection" style="display: none;">
            <span class="name" id="selectionLabel">—</span><span class="hint">F to focus</span>
        </div>
    </div>
</div>
<button id="fullscreenBtn" title="Fullscreen" aria-label="Toggle fullscreen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 9V4h5"/><path d="M20 9V4h-5"/>
        <path d="M4 15v5h5"/><path d="M20 15v5h-5"/>
    </svg>
</button>

<script type="importmap">
{
    "imports": {
        "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
'use strict';

import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

// ===== Constants =====
let   R = 500.0;                     // mutable: the R slider rebinds it live
const R_INITIAL = 500.0;             // the radius the extrinsic sphere geometry was built with
const EYE_HEIGHT = 1.7;
const WALK_SPEED = 100.0;            // m/s — a brisk run
const TURN_SPEED = 2.6;              // rad/s — A/D
const GRAVITY = 250.0;               // m/s²
const JUMP_VEL = 110.0;              // m/s
let   ORBIT_RADIUS = 80;             // third-person camera distance from player (mouse wheel)
const ORBIT_MIN = 20;
const ORBIT_MAX = 400;
const PLAYER_CENTER_Y = 15;          // half of player mesh height (PLAYER_H / 2)
// Patch resolution. The fragment shader does all the curvature math per
// pixel; the geometry only needs enough vertices for linear interpolation
// of vTangentPos, so a coarse grid (21×21 = 441 verts, ~800 triangles) is
// plenty. 121×121 (~86k triangles) was wasted geometry.
const GRID_N = 21;
// Half-extent of the flat tangent-plane ground patch, in arc-meters. Sized
// to fit "one full lap" at the largest R the slider allows
// (2π × 2000 ≈ 12566 → round up to 15000 for headroom). The View slider's
// max matches.
const GRID_HALF_ARC = 15000.0;
// Default far plane. Drag the View slider up (or click the lap buttons)
// if you want long-range wraps.
const DEFAULT_FAR   = 4000.0;
const PLAYER_COLOR = 0xff5e8a;

// ===== Frame: SO(3) state as a Matrix4, columns [right | forward | up] =====
class Frame {
    constructor() {
        this.M = new THREE.Matrix4();
        this._right = new THREE.Vector3();
        this._forward = new THREE.Vector3();
        this._up = new THREE.Vector3();
        this._tmp = new THREE.Matrix4();
        this._frameCount = 0;
    }
    right()   { return this._right.setFromMatrixColumn(this.M, 0); }
    forward() { return this._forward.setFromMatrixColumn(this.M, 1); }
    up()      { return this._up.setFromMatrixColumn(this.M, 2); }
    rotateAround(axis, angle) {
        if (angle === 0) return;
        this._tmp.makeRotationAxis(axis, angle);
        this.M.premultiply(this._tmp);
    }
    // Re-orthonormalize columns to fight float drift. Cheap; call ~once a second.
    reorthogonalize() {
        const e = this.M.elements;
        const r = new THREE.Vector3(e[0], e[1], e[2]).normalize();
        const f = new THREE.Vector3(e[4], e[5], e[6]);
        f.addScaledVector(r, -r.dot(f)).normalize();
        const u = new THREE.Vector3().crossVectors(r, f).normalize();
        e[0] = r.x; e[1] = r.y; e[2] = r.z;
        e[4] = f.x; e[5] = f.y; e[6] = f.z;
        e[8] = u.x; e[9] = u.y; e[10] = u.z;
    }
    tick() {
        if ((++this._frameCount % 60) === 0) this.reorthogonalize();
    }
}

// ===== World state =====
//   frame:        the player's SO(3) surface frame (their position + facing)
//   pitch:        camera elevation around the player (mouse-Y)
//   cameraAzim:   camera horizontal angle around the player (mouse-X)
//   h, vh:        player height and vertical velocity
//   grounded:     standing on ground or platform
const world = {
    frame: new Frame(),
    pitch: 0.20,
    cameraAzim: 0,
    h: 0,
    vh: 0,
    grounded: true
};

// The intrinsic view is a tangent plane centered NOT on the player but on
// the camera's surface projection. This makes the player just another entity
// at ~ORBIT_RADIUS·cos(pitch) from the origin; its wraps fall out of the
// generic universal-cover code with zero special cases. Recomputed every
// frame from world.frame + orbit parameters.
const cameraSurfaceFrame = new Frame();
const _camFrameTangentDir = new THREE.Vector3();
const _camFrameRotAxis = new THREE.Vector3();
function updateCameraSurfaceFrame() {
    cameraSurfaceFrame.M.copy(world.frame.M);
    const cosE = Math.cos(world.pitch);
    const camHorizDist = ORBIT_RADIUS * cosE;
    const angle = camHorizDist / R;
    if (angle < 1e-6) return;
    // Bearing in the player's tangent plane to the camera's surface point:
    //   tangent +X = player.right, tangent +Z = -player.forward (Three.js).
    //   bRight = sin(azim), bForward = -cos(azim) (so azim=0 → behind player).
    const bRight = Math.sin(world.cameraAzim);
    const bForward = -Math.cos(world.cameraAzim);
    _camFrameTangentDir.set(0, 0, 0)
        .addScaledVector(world.frame.right(),   bRight)
        .addScaledVector(world.frame.forward(), bForward);
    // Rotation axis from player.up toward the tangent direction.
    _camFrameRotAxis.crossVectors(world.frame.up(), _camFrameTangentDir);
    if (_camFrameRotAxis.lengthSq() < 1e-12) return;
    _camFrameRotAxis.normalize();
    cameraSurfaceFrame.rotateAround(_camFrameRotAxis, angle);
}

// ===== Entity helpers =====
//
// Each entity has a position on the manifold expressed as a unit vector
// `upWorld` (the surface normal where the entity stands) plus a scalar `h`
// (height above the surface). To render in the intrinsic view, project to
// the player's tangent space; in the extrinsic view, place absolutely.

const X_AXIS = new THREE.Vector3(1, 0, 0);
const Y_AXIS = new THREE.Vector3(0, 1, 0);
const Z_AXIS = new THREE.Vector3(0, 0, 1);

// Projects an entity at (upWorld, h) into player-local tangent coords.
// Writes (xLocal, h, zLocal) into `out` (Three.js convention: forward → -Z).
const _pUp = new THREE.Vector3();
const _pRight = new THREE.Vector3();
const _pForward = new THREE.Vector3();
const _pTangent = new THREE.Vector3();
function projectToTangent(upWorld, h, frame, out) {
    _pUp.copy(frame.up());
    _pRight.copy(frame.right());
    _pForward.copy(frame.forward());

    const cosArc = Math.max(-1, Math.min(1, upWorld.dot(_pUp)));
    const arc = R * Math.acos(cosArc);

    _pTangent.copy(upWorld).addScaledVector(_pUp, -cosArc);
    const tlen = _pTangent.length();
    if (tlen < 1e-6) {
        out.set(0, h, 0);
        return out;
    }
    _pTangent.divideScalar(tlen);
    const bRight = _pTangent.dot(_pRight);
    const bForward = _pTangent.dot(_pForward);
    out.set(arc * bRight, h, -arc * bForward);
    return out;
}

// Build an SO(3) frame matrix from an up vector + a forward hint. The
// forward vector is auto-projected onto the tangent plane.
function setFrameFromUpForward(frame, up, forwardHint) {
    const u = up.clone().normalize();
    const f = forwardHint.clone();
    f.addScaledVector(u, -u.dot(f)).normalize();
    const r = new THREE.Vector3().crossVectors(f, u).normalize();
    const e = frame.M.elements;
    e[0] = r.x; e[1] = r.y; e[2] = r.z; e[3] = 0;
    e[4] = f.x; e[5] = f.y; e[6] = f.z; e[7] = 0;
    e[8] = u.x; e[9] = u.y; e[10] = u.z; e[11] = 0;
    e[12] = 0;  e[13] = 0;  e[14] = 0;   e[15] = 1;
}

// Spawn-relative unit vector: a position offset by (forwardArc, rightArc)
// arc-meters from the player's spawn (identity frame, up = +Z, forward = +Y,
// right = +X). For initial entity placement only.
function arcUp(forwardArc, rightArc) {
    const v = new THREE.Vector3(0, 0, 1);
    if (forwardArc !== 0) v.applyAxisAngle(X_AXIS, -forwardArc / R);
    if (rightArc   !== 0) v.applyAxisAngle(Y_AXIS,  rightArc   / R);
    return v;
}

// Project an arbitrary vector hint onto the tangent plane at `upWorld`.
function projectForward(upWorld, hint) {
    const f = hint.clone();
    f.addScaledVector(upWorld, -upWorld.dot(f)).normalize();
    return f;
}

// Choose an orthonormal world frame for a static entity. The "forward"
// direction is the way the entity's mesh -Z (its "front" — where eyes face)
// points in the world. We orient it back toward the spawn so the player
// sees the front face on first walk-up rather than always seeing the back.
const _SPAWN_DIR = new THREE.Vector3(0, 0, 1);
function computeStaticMeshFrame(upWorld) {
    const u = upWorld.clone().normalize();
    const f = _SPAWN_DIR.clone();
    f.addScaledVector(u, -u.dot(f));
    if (f.lengthSq() < 1e-6) {
        // Entity is at the spawn (or antipode) — pick any tangent direction.
        f.set(0, 1, 0);
        f.addScaledVector(u, -u.dot(f));
    }
    f.normalize();
    const r = new THREE.Vector3().crossVectors(f, u).normalize();
    return { right: r, forward: f, up: u };
}

// ===== Grid shaders =====
//
// EXTRINSIC view (right panel): a sphere of radius R rendered with standard
// Three.js perspective. Fragment colors a lat/lon grid from the world-space
// vertex direction.
//
// INTRINSIC view (left panel): the ground IS a flat plane in the player's
// tangent space. There is no sphere, no curve, no embedding — the geometry
// is genuinely flat and rendered with a standard Three.js camera. The
// curvature appears only in the texture: each fragment computes the
// (θ, φ) it corresponds to on the manifold via the exponential map
// (Rodrigues rotation of the player's up vector toward the bearing of the
// fragment, by angle d/R), then stripes the grid from that.
//
// The horizon is flat because the geometry is flat. The curvature is
// visible only as grid-line convergence near the poles.

// --- Extrinsic sphere (the embedded surface itself; standard rendering) ---
const EXTRINSIC_VERTEX_SHADER = `
    varying vec3 vWorldPos;
    void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

// --- Extrinsic entity embedding ---
//
// The Euclidean embedding of S²×ℝ at intrinsic position (θ, φ, h) is
// (R + h) · unit_vector(θ, φ). For an entity with vertices in its own
// local frame {x_local along uMeshX, y_local = height-above-ground,
// z_local along uMeshZ}, each vertex's embedded world position is
//
//     unit_dir = exp(uObjectUp, x_local·uMeshX + z_local·uMeshZ, |arc|/R)
//     world = (R + uObjectH + y_local) · unit_dir
//
// This is the per-vertex truth. Earlier the code "fixed" the trapezoid
// effect for the striped pole by scaling each band uniformly — that gave
// the tower its sudden jumps. The smiley wasn't stretched at all. With
// this shader, both fall out for free: each vertex of the smiley is at
// its own h, and each level of the tower scales continuously.
const EXTRINSIC_EMBED_VERTEX_SHADER = `
    uniform vec3 uObjectUp;
    uniform vec3 uMeshX;
    uniform vec3 uMeshZ;
    uniform float uObjectH;
    uniform float uR;
    void main() {
        vec4 lp = modelMatrix * vec4(position, 1.0);
        float xLocal = lp.x;
        float yLocal = lp.y;
        float zLocal = lp.z;
        float hVertex = uObjectH + yLocal;
        float d = sqrt(xLocal * xLocal + zLocal * zLocal);
        vec3 unitDir;
        if (d < 1e-3) {
            unitDir = uObjectUp;
        } else {
            vec3 tangentVec = xLocal * uMeshX + zLocal * uMeshZ;
            vec3 tangentDir = tangentVec / d;
            float angle = d / uR;
            unitDir = uObjectUp * cos(angle) + tangentDir * sin(angle);
        }
        vec3 worldPos = (uR + hVertex) * unitDir;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
    }
`;

const EXTRINSIC_EMBED_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3 uColor;
    // uColor arrives as LINEAR space (Three.js converts hex from sRGB → linear
    // when constructing THREE.Color in r152+). The framebuffer expects sRGB,
    // and stock materials would do this conversion via <colorspace_fragment>;
    // since this is a custom shader we do it manually so the colors match
    // the intrinsic side. Full piecewise sRGB transfer (not a 1/2.2 approx)
    // for accuracy.
    vec3 linearToSRGB(vec3 c) {
        bvec3 cutoff = lessThan(c, vec3(0.0031308));
        vec3 hi = pow(c, vec3(1.0 / 2.4)) * 1.055 - 0.055;
        vec3 lo = c * 12.92;
        return mix(hi, lo, vec3(cutoff));
    }
    void main() {
        gl_FragColor = vec4(linearToSRGB(uColor), 1.0);
    }
`;

// Each entity has a single uniforms object shared by all of its child
// materials. Mutating its values updates all materials at once.
function createEntityUniforms() {
    return {
        uObjectUp:  { value: new THREE.Vector3(0, 1, 0) },
        uMeshX:     { value: new THREE.Vector3(1, 0, 0) },
        uMeshZ:     { value: new THREE.Vector3(0, 0, 1) },
        uObjectH:   { value: 0 }
    };
}

// Global R uniform — shared by every embedding material AND the intrinsic
// ground material. Mutating its `value` rebinds R everywhere.
const GLOBAL_R_UNIFORM = { value: R };

function embeddingMaterial(color, entityUniforms) {
    return new THREE.ShaderMaterial({
        vertexShader: EXTRINSIC_EMBED_VERTEX_SHADER,
        fragmentShader: EXTRINSIC_EMBED_FRAGMENT_SHADER,
        uniforms: {
            uObjectUp:  entityUniforms.uObjectUp,
            uMeshX:     entityUniforms.uMeshX,
            uMeshZ:     entityUniforms.uMeshZ,
            uObjectH:   entityUniforms.uObjectH,
            uR:         GLOBAL_R_UNIFORM,
            uColor:     { value: new THREE.Color(color) }
        }
    });
}

function basicMaterial(color) {
    return new THREE.MeshBasicMaterial({ color });
}

// Merge several pieces of an entity into one BufferGeometry with per-vertex
// colors. Each part is { geo, color, position?, rotationX/Y/Z?, scale? }.
// Used for the INTRINSIC side of multi-piece entities so each preimage is a
// single draw call instead of one per child mesh.
function mergeWithColors(parts) {
    const geos = parts.map(p => {
        const g = p.geo.clone();
        if (p.scale)     g.scale(p.scale.x, p.scale.y, p.scale.z);
        if (p.rotationX) g.rotateX(p.rotationX);
        if (p.rotationY) g.rotateY(p.rotationY);
        if (p.rotationZ) g.rotateZ(p.rotationZ);
        if (p.position)  g.translate(p.position.x, p.position.y, p.position.z);
        const n = g.attributes.position.count;
        const colors = new Float32Array(n * 3);
        const c = new THREE.Color(p.color);
        for (let i = 0; i < n; i++) {
            colors[i * 3]     = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
        }
        g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        return g;
    });
    return mergeGeometries(geos, false);
}

const VC_MATERIAL = new THREE.MeshBasicMaterial({ vertexColors: true });

const EXTRINSIC_FRAGMENT_SHADER = `
    precision highp float;
    varying vec3 vWorldPos;
    void main() {
        vec3 n = normalize(vWorldPos);
        float phi = asin(clamp(n.y, -1.0, 1.0));
        float theta = atan(n.z, n.x);
        float gridLat = smoothstep(0.94, 0.96, abs(cos(phi * 20.0)));
        float gridLon = smoothstep(0.94, 0.96, abs(cos(theta * 20.0)));
        // Fade longitude lines very close to the poles to avoid coord-singularity flicker.
        float poleFade = 1.0 - smoothstep(0.998, 1.0, abs(n.y));
        gridLon *= poleFade;
        float grid = max(gridLat, gridLon);
        // Latitude-based color gradient: red toward N, blue toward S.
        float t = (phi + 1.5707963) / 3.1415927;   // 0 at S, 1 at N
        vec3 baseColor = mix(vec3(0.15, 0.22, 0.55), vec3(0.55, 0.22, 0.15), t);
        vec3 color = mix(baseColor, vec3(0.05, 0.05, 0.05), grid);
        gl_FragColor = vec4(color, 1.0);
    }
`;

// --- Intrinsic ---
// Trivial passthrough vertex shader. The mesh's vertex positions ARE the
// player-local tangent-plane positions; standard Three.js perspective then
// renders them correctly because the geometry is genuinely flat.
const INTRINSIC_VERTEX_SHADER = `
    varying vec3 vTangentPos;
    void main() {
        vTangentPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

// Fragment computes the exponential map: which point on the manifold does
// this tangent-space fragment correspond to? Then derives (θ, φ) and stripes.
const INTRINSIC_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3 uPlayerRight;
    uniform vec3 uPlayerForward;
    uniform vec3 uPlayerUp;
    uniform float uR;
    varying vec3 vTangentPos;
    void main() {
        // vTangentPos is in the mesh's local frame: +X = right, +Y = up,
        // +Z is behind the camera (Three.js convention). Recover signed
        // forward arc.
        float arcX = vTangentPos.x;
        float arcZ = -vTangentPos.z;
        float d = sqrt(arcX * arcX + arcZ * arcZ);

        vec3 hitPoint;
        if (d < 1e-3) {
            hitPoint = uPlayerUp;
        } else {
            // tangentDir = sin(β)·right + cos(β)·forward, where β = atan2(arcX, arcZ).
            // sin(atan2(y, x)) = y/√(x²+y²), cos(atan2(y, x)) = x/√(x²+y²) — skip
            // the atan/sin/cos round-trip with one division.
            vec3 tangentDir = (arcX * uPlayerRight + arcZ * uPlayerForward) / d;
            float angle = d / uR;
            // Rodrigues: rotate uPlayerUp toward tangentDir by angle. Since
            // uPlayerUp ⟂ tangentDir, this collapses to the simple form.
            hitPoint = uPlayerUp * cos(angle) + tangentDir * sin(angle);
        }

        float phi = asin(clamp(hitPoint.y, -1.0, 1.0));
        float theta = atan(hitPoint.z, hitPoint.x);
        float gridLat = smoothstep(0.94, 0.96, abs(cos(phi * 20.0)));
        float gridLon = smoothstep(0.94, 0.96, abs(cos(theta * 20.0)));
        float poleFade = 1.0 - smoothstep(0.998, 1.0, abs(hitPoint.y));
        gridLon *= poleFade;
        float grid = max(gridLat, gridLon);
        // Latitude gradient: red toward N pole, blue toward S pole.
        float t = (phi + 1.5707963) / 3.1415927;   // 0 at S, 1 at N
        vec3 baseColor = mix(vec3(0.15, 0.22, 0.55), vec3(0.55, 0.22, 0.15), t);
        vec3 color = mix(baseColor, vec3(0.05, 0.05, 0.05), grid);
        gl_FragColor = vec4(color, 1.0);
    }
`;

function extrinsicGridMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader: EXTRINSIC_VERTEX_SHADER,
        fragmentShader: EXTRINSIC_FRAGMENT_SHADER,
        side: THREE.FrontSide
    });
}

function intrinsicGridMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader: INTRINSIC_VERTEX_SHADER,
        fragmentShader: INTRINSIC_FRAGMENT_SHADER,
        side: THREE.FrontSide,
        uniforms: {
            uPlayerRight:   { value: new THREE.Vector3(1, 0, 0) },
            uPlayerForward: { value: new THREE.Vector3(0, 1, 0) },
            uPlayerUp:      { value: new THREE.Vector3(0, 0, 1) },
            uR:             GLOBAL_R_UNIFORM
        }
    });
}

// ===== Extrinsic full sphere =====
function buildExtrinsicSphere(radius) {
    const geo = new THREE.SphereGeometry(radius, 96, 64);
    const mat = extrinsicGridMaterial();
    return new THREE.Mesh(geo, mat);
}

// ===== Ground patch: a static flat plane in the player's tangent space.
// Generated once at startup. The geometry never changes — the player frame
// uniforms drive the shader, which is what makes the world appear to move.
function buildGroundPatch() {
    const N = GRID_N;
    const positions = new Float32Array(N * N * 3);
    const indices = new Uint32Array((N - 1) * (N - 1) * 6);
    let idx = 0;
    for (let j = 0; j < N; j++) {
        const arcZ = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (j / (N - 1));
        for (let i = 0; i < N; i++) {
            const arcX = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (i / (N - 1));
            positions[idx++] = arcX;       // +X = right
            positions[idx++] = 0;          // ground plane y=0; camera sits at y=EYE_HEIGHT
            positions[idx++] = -arcZ;      // forward → -Z (Three.js convention)
        }
    }
    let k = 0;
    for (let j = 0; j < N - 1; j++) {
        for (let i = 0; i < N - 1; i++) {
            const a = j * N + i;
            const b = a + 1;
            const c = a + N;
            const d = c + 1;
            // CCW from above (camera looks down -Y onto ground at y=0).
            indices[k++] = a; indices[k++] = b; indices[k++] = c;
            indices[k++] = b; indices[k++] = d; indices[k++] = c;
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeBoundingSphere();

    const material = intrinsicGridMaterial();
    const mesh = new THREE.Mesh(geo, material);

    return { mesh, material };
}

// ===== Player mesh — shared between intrinsic and extrinsic views.
// Pink cube with white eye-rectangles, dark pupils, dark-pink belt at h*0.6.
// Group origin sits at the player's feet; eyes face local -Z (the walking
// direction). 22×30×22 to match the 2D prototype.
const PLAYER_W = 22;
const PLAYER_H = 30;
const PLAYER_BELT_COLOR = 0x7a2848;

function playerParts() {
    const eyeY = PLAYER_H * 0.75;
    const eyeZ = -PLAYER_W / 2 - 0.1;
    const parts = [
        { geo: new THREE.BoxGeometry(PLAYER_W, PLAYER_H, PLAYER_W),
          color: PLAYER_COLOR,
          position: { x: 0, y: PLAYER_H / 2, z: 0 } },
        { geo: new THREE.BoxGeometry(PLAYER_W + 0.2, 1.5, PLAYER_W + 0.2),
          color: PLAYER_BELT_COLOR,
          position: { x: 0, y: PLAYER_H * 0.6, z: 0 } },
    ];
    const eyeGeo = new THREE.BoxGeometry(4, 5, 0.4);
    const pupilGeo = new THREE.BoxGeometry(2, 3, 0.2);
    for (const sx of [-1, 1]) {
        parts.push({ geo: eyeGeo, color: 0xffffff,
                     position: { x: sx * PLAYER_W * 0.2, y: eyeY, z: eyeZ } });
        parts.push({ geo: pupilGeo, color: 0x000000,
                     position: { x: sx * PLAYER_W * 0.2, y: eyeY, z: eyeZ - 0.3 } });
    }
    parts.push({ geo: new THREE.BoxGeometry(1, 1, 0.2),
                 color: 0x000000,
                 position: { x: 0, y: PLAYER_H * 0.35, z: PLAYER_W / 2 + 0.1 } });
    // L-shaped arms (dark pink) — upper arm down from shoulder, forearm
    // bending forward at the elbow. Visible from any angle, breaks the
    // mirror symmetry so it's easy to tell the character's facing.
    const upperArmGeo = new THREE.BoxGeometry(2, 6, 2);
    const forearmGeo  = new THREE.BoxGeometry(2, 2, 5);
    const armX = PLAYER_W / 2 + 1;
    for (const sx of [-1, 1]) {
        parts.push({ geo: upperArmGeo, color: PLAYER_BELT_COLOR,
                     position: { x: sx * armX, y: PLAYER_H * 0.6, z: 0 } });
        parts.push({ geo: forearmGeo,  color: PLAYER_BELT_COLOR,
                     position: { x: sx * armX, y: PLAYER_H * 0.45, z: -3 } });
    }
    return parts;
}

// EXTRINSIC build: Group of separate Meshes so each child carries its own
// embedding-shader material. The cost (~7 draw calls per player) is paid
// only once per entity in the extrinsic view, no preimages.
function makePlayerMeshExtrinsic(materialFor) {
    const g = new THREE.Group();
    for (const p of playerParts()) {
        const m = new THREE.Mesh(p.geo, materialFor(p.color));
        m.position.set(p.position.x, p.position.y, p.position.z);
        g.add(m);
    }
    return g;
}

// INTRINSIC build: one merged BufferGeometry with vertex colors. Each
// preimage is a single draw call regardless of how many parts.
function makePlayerMeshIntrinsic() {
    return new THREE.Mesh(mergeWithColors(playerParts()), VC_MATERIAL);
}

// ===== Entity factories =====
//
// Each factory returns
//   { kind, intrinsicMesh, extrinsicMesh, upWorld, h, ... }
// with the meshes always built so that local +Y is "up" and the group's
// origin sits at the entity's base height. Walkers carry their own SO(3)
// frame and read upWorld from it each frame instead.

const COLOR_WALKER_RED   = 0xe84c4c;
const COLOR_WALKER_GREEN = 0x4ce8a8;
const COLOR_TRUNK        = 0x7a4a22;
const COLOR_CANOPY       = 0x2f8a3f;
const COLOR_CANOPY_LIGHT = 0x3fa64f;
const COLOR_SMILEY       = 0xffd84a;
const COLOR_SMILEY_DARK  = 0x222222;
const COLOR_PLATFORM_BASE = 0x7a4a22;
const COLOR_PLATFORM_TOP  = 0x3a8c3a;
const POLE_COLORS = [
    0xe84c4c, 0xf0f0f0, 0x4c8ae8, 0xf0f0f0, 0xe8c84c,
    0xf0f0f0, 0x4ce884, 0xf0f0f0, 0xc084ff, 0xf0f0f0
];

// Walker — solid colored cube. Matches 2D exactly: no eyes or other features.
function makeWalker(color, walkSpeed, upWorld, forwardHint) {
    const W = 20;
    const H = 24;
    const geo = new THREE.BoxGeometry(W, H, W);
    const make = (mat) => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(geo, mat);
        body.position.y = H / 2;
        g.add(body);
        return g;
    };
    const frame = new Frame();
    setFrameFromUpForward(frame, upWorld, forwardHint);
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'walker',
        frame,
        intrinsicMesh: make(basicMaterial(color)),
        extrinsicMesh: make(embeddingMaterial(color, entityUniforms)),
        entityUniforms,
        h: 0,
        speed: walkSpeed,
        size: W,
        height: H
    };
}

// Tree — matches the 2D prototype's three-circle canopy.
//   trunk: 14×40, brown, sits on the ground
//   main canopy: dark-green sphere, radius 28
//   secondary 1: lighter-green, radius 18, slightly above and to the left
//   secondary 2: lighter-green, radius 16, slightly above and to the right
// 2D positions translated: 2D entity y=0 is top, y=120 is bottom, so
// 2D y=40-from-top → 3D y=80-from-ground in a 120-tall entity.
function makeTree(upWorld) {
    const TRUNK_W = 14;
    const TRUNK_H = 40;
    const parts = [
        { geo: new THREE.BoxGeometry(TRUNK_W, TRUNK_H, TRUNK_W),
          color: COLOR_TRUNK, position: { x: 0, y: TRUNK_H / 2, z: 0 } },
        { geo: new THREE.SphereGeometry(28, 24, 16),
          color: COLOR_CANOPY, position: { x: 0, y: 80, z: 0 } },
        { geo: new THREE.SphereGeometry(18, 18, 14),
          color: COLOR_CANOPY_LIGHT, position: { x: -10, y: 88, z: 0 } },
        { geo: new THREE.SphereGeometry(16, 18, 14),
          color: COLOR_CANOPY_LIGHT, position: { x: 12, y: 84, z: 0 } }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'tree',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        upWorld,
        h: 0
    };
}

function makeSmiley(upWorld, h, radius) {
    const RR = radius || 25;
    const z = -RR * 0.92;
    const eyeGeo = new THREE.SphereGeometry(RR * 0.13, 12, 8);
    const parts = [
        { geo: new THREE.SphereGeometry(RR, 32, 24),
          color: COLOR_SMILEY, position: { x: 0, y: 0, z: 0 } },
        { geo: eyeGeo, color: COLOR_SMILEY_DARK,
          position: { x: -RR * 0.32, y: RR * 0.20, z } },
        { geo: eyeGeo, color: COLOR_SMILEY_DARK,
          position: { x:  RR * 0.32, y: RR * 0.20, z } },
        { geo: new THREE.TorusGeometry(RR * 0.45, RR * 0.06, 8, 24, Math.PI),
          color: COLOR_SMILEY_DARK,
          position: { x: 0, y: -RR * 0.10, z: z * 0.97 },
          rotationZ: Math.PI }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            if (p.rotationZ) m.rotation.z = p.rotationZ;
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'smiley',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        upWorld,
        h
    };
}

function makeStripedPole(upWorld) {
    const POLE_W = 12;
    const TOTAL_H = 300;
    const N_BANDS = POLE_COLORS.length;
    const BAND_H = TOTAL_H / N_BANDS;
    const bandGeo = new THREE.BoxGeometry(POLE_W, BAND_H, POLE_W);
    const parts = [];
    for (let i = 0; i < N_BANDS; i++) {
        parts.push({
            geo: bandGeo,
            color: POLE_COLORS[i],
            position: { x: 0, y: i * BAND_H + BAND_H / 2, z: 0 }
        });
    }
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'pole',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        // The embedding shader handles per-vertex scaling; no per-band hack.
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        upWorld,
        h: 0
    };
}

function makePlatform(upWorld, h, width, depth, height) {
    const baseH = height * 0.82;
    const topH = height - baseH;
    const parts = [
        { geo: new THREE.BoxGeometry(width, baseH, depth),
          color: COLOR_PLATFORM_BASE,
          position: { x: 0, y: baseH / 2, z: 0 } },
        { geo: new THREE.BoxGeometry(width, topH, depth),
          color: COLOR_PLATFORM_TOP,
          position: { x: 0, y: baseH + topH / 2, z: 0 } }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'platform',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        upWorld,
        h,
        height,
        _platformW: width,
        _platformH: height,
        _platformD: depth,
        footprintRadius: Math.max(width, depth) * 0.5  // for player landing CCD
    };
}

// ===== Extrinsic view: scene, camera, renderer, inline orbit controls =====
function makeExtrinsicView(canvas) {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a10);

    const sphere = buildExtrinsicSphere(R);
    scene.add(sphere);

    const camera = new THREE.PerspectiveCamera(45, 1, 1, R * 50);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Orbit state. `target` is the lookAt point — origin by default; middle-
    // click pans it sideways/up so you can frame the view off-center.
    const orbit = {
        azimuth: 0.6,
        elevation: 0.4,
        radius: R * 2.5,
        target: new THREE.Vector3(0, 0, 0),
        mode: null,        // 'orbit' | 'pan' | null
        lastX: 0,
        lastY: 0
    };

    const _camRight = new THREE.Vector3();
    const _camUp = new THREE.Vector3();
    const _camForward = new THREE.Vector3();

    // Selection state. Selecting an entity (or the planet) puts a yellow
    // wireframe sphere around it; pressing F focuses the orbit target on it.
    // Each entity kind has a center offset along upWorld (so the focus is
    // mid-body, not at the surface) and a hit radius for both ray-vs-sphere
    // pick and the visible highlight.
    const FOCUS_OFFSET = {
        player: PLAYER_H * 0.5, walker: 12, tree: 60, smiley: 0,
        pole: 150, platform: 11
    };
    const HIT_RADIUS = {
        player: 22, walker: 20, tree: 60, smiley: 90,
        pole: 155, platform: 30
    };
    const raycaster = new THREE.Raycaster();
    const _ndc = new THREE.Vector2();
    const _entityCenter = new THREE.Vector3();
    let selection = null;   // { kind: 'entity'|'planet', entity?, focus, radius }
    // Per-kind wireframe outlines so the highlight matches the entity's
    // shape — sphere for the planet/smiley, cylinder for tall thin things
    // like the pole, box for cuboid entities. Built lazily on first
    // selection and cached on the entity (planetWireGeo for the planet).
    const _planetWireGeo = new THREE.SphereGeometry(R_INITIAL, 32, 24);
    const SELECTION_MAT = new THREE.MeshBasicMaterial({
        color: 0xffe14a, wireframe: true, transparent: true, opacity: 0.55
    });
    const selectionMesh = new THREE.Mesh(_planetWireGeo, SELECTION_MAT);
    selectionMesh.visible = false;
    scene.add(selectionMesh);

    function ensureWireGeo(e) {
        if (e._wireGeo) return e._wireGeo;
        const PAD = 4;
        let g;
        switch (e.kind) {
            case 'player':
                g = new THREE.BoxGeometry(PLAYER_W + PAD, PLAYER_H + PAD, PLAYER_W + PAD);
                g.translate(0, PLAYER_H * 0.5, 0); break;
            case 'walker':
                g = new THREE.BoxGeometry(20 + PAD, 24 + PAD, 20 + PAD);
                g.translate(0, 12, 0); break;
            case 'tree':
                g = new THREE.CylinderGeometry(36, 16, 112, 14);
                g.translate(0, 56, 0); break;
            case 'smiley':
                g = new THREE.SphereGeometry(85, 18, 12); break;
            case 'pole':
                g = new THREE.CylinderGeometry(10, 10, 305, 10);
                g.translate(0, 150, 0); break;
            case 'platform':
                g = new THREE.BoxGeometry(
                    (e._platformW || 50) + PAD,
                    (e._platformH || 22) + PAD,
                    (e._platformD || 50) + PAD
                );
                g.translate(0, (e._platformH || 22) * 0.5, 0); break;
            default:
                g = new THREE.SphereGeometry(25, 16, 12);
        }
        e._wireGeo = g;
        return g;
    }

    function entityCenter(e, out) {
        const upWorld = (e.frame ? e.frame.up() : e.upWorld);
        const centerH = (e.h || 0) + (FOCUS_OFFSET[e.kind] || 0);
        return out.copy(upWorld).multiplyScalar(R + centerH);
    }
    function raySphereT(ro, rd, cx, cy, cz, r) {
        const ox = ro.x - cx, oy = ro.y - cy, oz = ro.z - cz;
        const b = ox * rd.x + oy * rd.y + oz * rd.z;
        const c = ox*ox + oy*oy + oz*oz - r*r;
        const disc = b*b - c;
        if (disc < 0) return null;
        const t = -b - Math.sqrt(disc);
        return (t < 0) ? null : t;
    }
    function pickAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        _ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        _ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(_ndc, camera);
        const ro = raycaster.ray.origin;
        const rd = raycaster.ray.direction;
        let bestT = Infinity, best = null;
        for (const e of entities) {
            entityCenter(e, _entityCenter);
            const r = HIT_RADIUS[e.kind] || 25;
            const t = raySphereT(ro, rd, _entityCenter.x, _entityCenter.y, _entityCenter.z, r);
            if (t !== null && t < bestT) {
                bestT = t;
                best = { kind: 'entity', entity: e, focus: _entityCenter.clone(), radius: r };
            }
        }
        // Planet — sphere at origin, radius R.
        const tPlanet = raySphereT(ro, rd, 0, 0, 0, R);
        if (tPlanet !== null && tPlanet < bestT) {
            best = { kind: 'planet', focus: new THREE.Vector3(0, 0, 0), radius: R };
        }
        return best;
    }
    function updateSelection() {
        if (!selection) { selectionMesh.visible = false; return; }
        selectionMesh.visible = true;
        if (selection.kind === 'planet') {
            selectionMesh.geometry = _planetWireGeo;
            selectionMesh.position.set(0, 0, 0);
            selectionMesh.quaternion.identity();
            selectionMesh.scale.setScalar(R / R_INITIAL * 1.012);
            return;
        }
        // Entity — fit a kind-specific wireframe shape, oriented vertically
        // along the entity's surface up.
        const e = selection.entity;
        selectionMesh.geometry = ensureWireGeo(e);
        const upWorld = (e.frame ? e.frame.up() : e.upWorld);
        // Place the highlight at the entity's surface point (y=0 of the
        // wire geo is the base, since each geo's translate matches the
        // entity's local layout).
        const h = e.h || 0;
        selectionMesh.position.copy(upWorld).multiplyScalar(R + h);
        selectionMesh.quaternion.setFromUnitVectors(Y_AXIS, upWorld);
        selectionMesh.scale.setScalar(1);
    }

    function applyOrbit() {
        const ce = Math.cos(orbit.elevation);
        const se = Math.sin(orbit.elevation);
        const ca = Math.cos(orbit.azimuth);
        const sa = Math.sin(orbit.azimuth);
        camera.position.set(
            orbit.target.x + orbit.radius * ce * sa,
            orbit.target.y + orbit.radius * se,
            orbit.target.z + orbit.radius * ce * ca
        );
        camera.lookAt(orbit.target);
    }
    applyOrbit();

    // Unity Scene-view–style camera controls:
    //   LMB drag        — orbit around target (kept for usability; Unity uses Alt+LMB)
    //   Alt + LMB drag  — orbit around target (Unity-strict)
    //   MMB drag        — pan
    //   RMB drag        — FPS look (rotate camera in place — pivot is camera, not target)
    //   Alt + RMB drag  — drag-zoom (vertical drag changes radius)
    //   Wheel           — zoom (radius)
    //   F               — frame the planet center (reset target to origin)
    let pointerDownX = 0, pointerDownY = 0;
    canvas.style.cursor = 'grab';
    canvas.addEventListener('pointerdown', (e) => {
        const alt = e.altKey;
        if      (e.button === 0)               orbit.mode = 'orbit';
        else if (e.button === 1)               orbit.mode = 'pan';
        else if (e.button === 2 &&  alt)       orbit.mode = 'dragZoom';
        else if (e.button === 2 && !alt)       orbit.mode = 'fpsLook';
        else return;
        e.preventDefault();
        pointerDownX = e.clientX;
        pointerDownY = e.clientY;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor =
            orbit.mode === 'pan'      ? 'move' :
            orbit.mode === 'fpsLook'  ? 'crosshair' :
            orbit.mode === 'dragZoom' ? 'ns-resize' :
                                        'grabbing';
    });
    canvas.addEventListener('pointermove', (e) => {
        if (!orbit.mode) return;
        const dx = e.clientX - orbit.lastX;
        const dy = e.clientY - orbit.lastY;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        if (orbit.mode === 'orbit') {
            orbit.azimuth -= dx * 0.005;
            orbit.elevation = Math.max(-1.4, Math.min(1.4, orbit.elevation + dy * 0.005));
        } else if (orbit.mode === 'pan') {
            // Translate the target along the camera's screen-right and
            // screen-up axes. Rate scales with orbit radius so the panning
            // speed matches what's visible.
            camera.matrixWorld.extractBasis(_camRight, _camUp, _camForward);
            const rate = orbit.radius * 0.0015;
            orbit.target.addScaledVector(_camRight, -dx * rate);
            orbit.target.addScaledVector(_camUp,    dy * rate);
        } else if (orbit.mode === 'fpsLook') {
            // Rotate the view direction without moving the camera. Save
            // current camera position, update angles, then move target so
            // camera.position recomputes to the same world point.
            const ce0 = Math.cos(orbit.elevation), se0 = Math.sin(orbit.elevation);
            const ca0 = Math.cos(orbit.azimuth),   sa0 = Math.sin(orbit.azimuth);
            const camX = orbit.target.x + orbit.radius * ce0 * sa0;
            const camY = orbit.target.y + orbit.radius * se0;
            const camZ = orbit.target.z + orbit.radius * ce0 * ca0;
            orbit.azimuth -= dx * 0.005;
            orbit.elevation = Math.max(-1.4, Math.min(1.4, orbit.elevation + dy * 0.005));
            const ce1 = Math.cos(orbit.elevation), se1 = Math.sin(orbit.elevation);
            const ca1 = Math.cos(orbit.azimuth),   sa1 = Math.sin(orbit.azimuth);
            orbit.target.set(
                camX - orbit.radius * ce1 * sa1,
                camY - orbit.radius * se1,
                camZ - orbit.radius * ce1 * ca1
            );
        } else if (orbit.mode === 'dragZoom') {
            // Drag down zooms out, drag up zooms in.
            const factor = Math.exp(dy * 0.005);
            orbit.radius = Math.max(R * 1.1, Math.min(R * 20, orbit.radius * factor));
        }
        applyOrbit();
    });
    function endDrag(e) {
        if (!orbit.mode) return;
        // Detect click vs drag — small movement on LMB → pick selection.
        const dx = e.clientX - pointerDownX;
        const dy = e.clientY - pointerDownY;
        const wasClick = (dx * dx + dy * dy) < 25;
        if (wasClick && orbit.mode === 'orbit' && e.button === 0) {
            selection = pickAt(e.clientX, e.clientY);
        }
        orbit.mode = null;
        try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
        canvas.style.cursor = 'grab';
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
    // Don't show the browser context menu on RMB or auto-scroll on MMB.
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    canvas.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

    // F frames the planet center: snap target back to origin without
    // disturbing azimuth / elevation / radius.
    canvas.tabIndex = 0;  // make canvas focusable so it can receive key events
    canvas.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') {
            // F focuses on the selected object (or the planet center if nothing selected).
            if (selection) {
                if (selection.kind === 'entity') entityCenter(selection.entity, selection.focus);
                orbit.target.copy(selection.focus);
            } else {
                orbit.target.set(0, 0, 0);
            }
            applyOrbit();
            e.preventDefault();
        } else if (e.key === 'Escape') {
            selection = null;
            e.preventDefault();
        }
    });
    canvas.addEventListener('pointerenter', () => { canvas.focus(); });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = Math.exp(e.deltaY * 0.0012);
        orbit.radius = Math.max(R * 1.1, Math.min(R * 20, orbit.radius * factor));
        applyOrbit();
    }, { passive: false });

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function render() {
        updateSelection();
        renderer.render(scene, camera);
    }

    return {
        scene, camera, renderer, sphere, orbit, applyOrbit, resize, render,
        getSelection: () => selection
    };
}

// ===== Intrinsic view: standard Three.js camera looking at a flat plane.
// Third-person camera orbits the player vertically with pitch; yaw rotates
// the player frame so the world spins around the camera-and-player together.
function makeIntrinsicView(canvas) {
    const scene = new THREE.Scene();
    // Sky comes from a CSS gradient on the canvas; let WebGL clear transparently.

    const ground = buildGroundPatch();
    scene.add(ground.mesh);

    const camera = new THREE.PerspectiveCamera(70, 1, 0.1, DEFAULT_FAR);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    // Third-person camera. The tangent plane is now centered on the camera's
    // surface projection (see updateCameraSurfaceFrame), so the camera lives
    // at the tangent origin (horizontal=0,0) at its world height. The player
    // is just another entity in the scene; the camera looks at the player's
    // tangent position.
    const _lookTarget = new THREE.Vector3();
    const _playerTangentTmp = new THREE.Vector3();

    function placeCamera(world) {
        const cameraHeight = world.h + PLAYER_CENTER_Y + ORBIT_RADIUS * Math.sin(world.pitch);
        camera.position.set(0, cameraHeight, 0);
        camera.up.set(0, 1, 0);
        // Aim at the player's tangent position (which is no longer the origin).
        projectToTangent(world.frame.up(), world.h, cameraSurfaceFrame, _playerTangentTmp);
        _lookTarget.set(_playerTangentTmp.x, _playerTangentTmp.y + PLAYER_CENTER_Y, _playerTangentTmp.z);
        camera.lookAt(_lookTarget);
    }

    function updateGroundUniforms() {
        const u = ground.material.uniforms;
        u.uPlayerRight.value.copy(cameraSurfaceFrame.right());
        u.uPlayerForward.value.copy(cameraSurfaceFrame.forward());
        u.uPlayerUp.value.copy(cameraSurfaceFrame.up());
    }

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function render(world) {
        updateGroundUniforms();
        placeCamera(world);
        renderer.render(scene, camera);
    }

    return { scene, camera, renderer, ground, resize, render };
}

// ===== Bootstrap =====
const intrinsicCanvas = document.getElementById('intrinsicCanvas');
const extrinsicCanvas = document.getElementById('extrinsicCanvas');

const intrinsicView = makeIntrinsicView(intrinsicCanvas);
const extrinsicView = makeExtrinsicView(extrinsicCanvas);

function resizeAll() {
    intrinsicView.resize();
    extrinsicView.resize();
}
window.addEventListener('resize', resizeAll);
resizeAll();

// ===== Spawn entities =====
const entities = [];
const walkers = [];

// Hard upper cap on the universal-cover preimage count per entity. The
// actual count used per frame is `maxPreimagesForR(R)` — which scales
// down as R grows. At R=2000 we only need ~2; at R=100 we need ~39.
const MAX_PREIMAGES = 40;

function maxPreimagesForR(r) {
    const C = 2 * Math.PI * r;
    // Reads the current intrinsic camera far plane so that the View slider's
    // changes flow through to clone allocation.
    const farLimit = (typeof intrinsicView !== 'undefined') ? intrinsicView.camera.far : 12000;
    // 2× covers forward + backward direction; +2 for safety/mid-frame R changes.
    return Math.min(MAX_PREIMAGES, Math.ceil(2 * farLimit / C) + 2);
}

function fitCloneCount(e, target) {
    const have = e.intrinsicCopies.length;
    if (target === have) return;
    if (target > have) {
        // Grow: clone the canonical mesh and add to the scene.
        for (let i = have; i < target; i++) {
            const clone = e.intrinsicMesh.clone(true);
            clone.visible = false;
            e.intrinsicCopies.push(clone);
            intrinsicView.scene.add(clone);
        }
    } else {
        // Shrink: remove extras from the scene first, then truncate the
        // array. Truncating inside the loop would make subsequent reads
        // undefined and leave clones stuck in the scene at their last
        // position.
        for (let i = have - 1; i >= target; i--) {
            intrinsicView.scene.remove(e.intrinsicCopies[i]);
        }
        e.intrinsicCopies.length = target;
    }
}

function addEntity(e) {
    entities.push(e);
    if (e.kind === 'walker') {
        walkers.push(e);
    } else if (e.kind !== 'player') {
        e.staticFrame = computeStaticMeshFrame(e.upWorld);
    }
    // Universal cover. Light from the entity reaches the player along
    // every great circle through it: the primary geodesic, the antipodal
    // (long-way-around), and then wraps of both. Each path is a real
    // geodesic in S²×ℝ, so the entity legitimately appears at every
    // preimage tangent-plane position. We allocate exactly the number of
    // clones the current R could ever make visible — far fewer than the
    // hard cap MAX_PREIMAGES at typical R — and grow/shrink the array as
    // the slider moves. (Hidden Object3Ds are still walked by the
    // renderer for matrix update / frustum culling, so keeping the count
    // tight matters.)
    e.intrinsicCopies = [e.intrinsicMesh];
    intrinsicView.scene.add(e.intrinsicMesh);
    fitCloneCount(e, maxPreimagesForR(R));
    extrinsicView.scene.add(e.extrinsicMesh);
}

// The player character — added as a regular entity. Its frame, h, and
// derived properties are live: e.frame === world.frame, e.upWorld and e.h
// are getters returning the current world state. Universal-cover wraps and
// orientation tracking are handled by the same updateEntities loop that
// runs for every other entity.
{
    const playerUniforms = createEntityUniforms();
    addEntity({
        kind: 'player',
        intrinsicMesh: makePlayerMeshIntrinsic(),
        extrinsicMesh: makePlayerMeshExtrinsic((c) => embeddingMaterial(c, playerUniforms)),
        entityUniforms: playerUniforms,
        frame: world.frame,
        get upWorld() { return world.frame.up(); },
        get h()       { return world.h; }
    });
}

// Two walkers spawning at the player's surface position, each travelling
// along a great circle perpendicular to the other. Speed is angular
// (rad/s); π = one full lap every 2 seconds, regardless of R.
{
    const red  = makeWalker(0xe84c4c, Math.PI, arcUp(0, 0), Y_AXIS.clone());
    red.label  = 'Red walker';
    addEntity(red);
    const blue = makeWalker(0x4c8ae8, Math.PI, arcUp(0, 0), X_AXIS.clone());
    blue.label = 'Blue walker';
    addEntity(blue);
}

// Three landmarks forming a triangle around spawn at radius ~80m.
addEntity(makeTree(arcUp(80, 0)));                                  // bearing 0° (north)
addEntity(makeStripedPole(arcUp(-40, 69)));                         // bearing 120°
addEntity(makePlatform(arcUp(-40, -69), 0, 45, 45, 22));            // bearing 240°

// Smiling face floating high overhead — bigger and further up than v0.x.
addEntity(makeSmiley(arcUp(150, 100), 400, 80));

const _entityPos = new THREE.Vector3();
const _moveDirWorld = new THREE.Vector3();
const _oldFwd = new THREE.Vector3();
const _crossTmp = new THREE.Vector3();

// Scratch vectors for entity orientation projection.
const _eR = new THREE.Vector3();
const _eU = new THREE.Vector3();
const _eF = new THREE.Vector3();
const _entXt = new THREE.Vector3();
const _entYt = new THREE.Vector3();
const _entZt = new THREE.Vector3();
const _entMat = new THREE.Matrix4();

function updateEntities(dt) {
    // Walkers walk along their own great circles. Walking forward = rotate
    // their frame around right by -v·dt/R, same as the player.
    for (const w of walkers) {
        // walker.speed is angular velocity in rad/s, independent of R, so a
        // walker with speed π laps the world every 2 seconds at every R.
        w.frame.rotateAround(w.frame.right(), -w.speed * dt);
        if ((w._tickCount = (w._tickCount || 0) + 1) % 60 === 0) {
            w.frame.reorthogonalize();
        }
    }

    // Project everything from the CAMERA's surface frame, not the player's.
    // This collapses what used to be "the player is at distance 0 from
    // themselves so the wrap math is degenerate" — the player is now an
    // ordinary entity at finite distance from the tangent origin.
    const pR = cameraSurfaceFrame.right();
    const pU = cameraSurfaceFrame.up();
    const pF = cameraSurfaceFrame.forward();
    const C = 2 * Math.PI * R;                     // circumference of a great circle
    const farLimit = intrinsicView.camera.far;     // beyond this the preimage is clipped

    for (const e of entities) {
        // Capture entity world axes. frame may be the player's world frame,
        // a walker's own frame, or a static spawn-time frame.
        if (e.frame) {
            _eR.copy(e.frame.right());
            _eU.copy(e.frame.up());
            _eF.copy(e.frame.forward());
        } else {
            _eR.copy(e.staticFrame.right);
            _eU.copy(e.staticFrame.up);
            _eF.copy(e.staticFrame.forward);
        }

        // Yaw-only orientation. In S²×ℝ the height axis is independent of
        // the surface (the metric has no (R+h)² term — §8 of the spec), so
        // every entity stands vertically along the SAME global "up" in the
        // inhabitant's tangent plane. Mesh +Y is always (0, 1, 0).
        // Only the yaw varies with player position: the entity's world
        // forward projected onto the player's tangent horizontal plane.
        const fx = _eF.dot(pR);
        const fz = -_eF.dot(pF);
        const fLen = Math.sqrt(fx * fx + fz * fz);
        if (fLen > 1e-6) {
            const nx = fx / fLen;
            const nz = fz / fLen;
            _entZt.set(-nx, 0, -nz);
            _entXt.crossVectors(Y_AXIS, _entZt).normalize();
            _entYt.set(0, 1, 0);
        } else {
            _entXt.set(1, 0, 0);
            _entYt.set(0, 1, 0);
            _entZt.set(0, 0, 1);
        }
        _entMat.makeBasis(_entXt, _entYt, _entZt);

        // Intrinsic: project the entity's surface point to the camera's
        // tangent frame, then enumerate preimages along the unique great
        // circle through camera-surface and entity-surface. Each preimage is
        // a real geodesic image.
        projectToTangent(_eU, e.h, cameraSurfaceFrame, _entityPos);
        const xL = _entityPos.x;
        const yL = _entityPos.y;
        const zL = _entityPos.z;
        const s = Math.sqrt(xL * xL + zL * zL);

        const cap = e.intrinsicCopies.length;
        let copyIdx = 0;
        if (s < 1e-3) {
            // Player is at the entity's surface position — only one preimage
            // is well-defined (the entity's own location).
            const c = e.intrinsicCopies[0];
            c.visible = true;
            c.position.set(0, yL, 0);
            c.quaternion.setFromRotationMatrix(_entMat);
            copyIdx = 1;
        } else {
            // Forward wraps: arc = s + n·C, same bearing β.
            for (let n = 0; copyIdx < cap; n++) {
                const arc = s + n * C;
                if (arc > farLimit) break;
                const scale = arc / s;
                const c = e.intrinsicCopies[copyIdx++];
                c.visible = true;
                c.position.set(xL * scale, yL, zL * scale);
                c.quaternion.setFromRotationMatrix(_entMat);
            }
            // Backward wraps: arc = (n+1)·C − s, bearing β + π (opposite direction).
            for (let n = 0; copyIdx < cap; n++) {
                const arc = (n + 1) * C - s;
                if (arc > farLimit) break;
                const scale = arc / s;
                const c = e.intrinsicCopies[copyIdx++];
                c.visible = true;
                c.position.set(-xL * scale, yL, -zL * scale);
                c.quaternion.setFromRotationMatrix(_entMat);
            }
        }
        // Hide any preimages from previous frames that aren't in range now.
        for (let i = copyIdx; i < e.intrinsicCopies.length; i++) {
            e.intrinsicCopies[i].visible = false;
        }

        // Extrinsic: push uniforms; the embedding shader does the placement.
        // Convention: uMeshZ is the world direction that mesh +Z (the BACK
        // of the entity) maps to, so uMeshZ = -entity.forward.
        const u = e.entityUniforms;
        u.uObjectUp.value.copy(_eU);
        u.uMeshX.value.copy(_eR);
        u.uMeshZ.value.copy(_eF).multiplyScalar(-1);
        u.uObjectH.value = e.h;
    }
}

// ===== Input =====
//
// Mouse  — orbits the camera around the player (azimuth + elevation).
// W/A/S/D — move the character RELATIVE TO THE CAMERA's view direction
//           (W = away from camera, S = toward camera, A/D = camera-left/
//           right). The character automatically rotates to face the
//           movement direction. Modern third-person convention.
// Space  — jump (only when grounded).
const keys = { w: false, a: false, s: false, d: false };
let pointerLocked = false;
let camAzimAccum = 0;
let pitchAccum = 0;
const MOUSE_SENSITIVITY = 0.003;
// Camera elevation range — pitch IS the elevation (no offset). Lower bound
// keeps the camera above the surface for any reasonable orbit radius.
const PITCH_MIN = -0.18;
const PITCH_MAX = 1.45;

intrinsicCanvas.addEventListener('click', () => {
    if (!pointerLocked) intrinsicCanvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === intrinsicCanvas;
});
document.addEventListener('mousemove', (e) => {
    if (!pointerLocked) return;
    // Inverted X: moving the mouse left orbits the camera left around the
    // character, so the world appears to rotate right — matches the
    // expectation when controlling the camera (not the character).
    camAzimAccum -= e.movementX * MOUSE_SENSITIVITY;
    pitchAccum   += e.movementY * MOUSE_SENSITIVITY;
});

// Mouse wheel on the intrinsic canvas zooms the third-person camera in/out
// by changing the orbit radius. Same factor as the extrinsic view's wheel.
intrinsicCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = Math.exp(e.deltaY * 0.0012);
    ORBIT_RADIUS = Math.max(ORBIT_MIN, Math.min(ORBIT_MAX, ORBIT_RADIUS * factor));
}, { passive: false });

// ===== R slider =====
const rSlider = document.getElementById('rSlider');
const rValueEl = document.getElementById('rValue');
rSlider.disabled = false;
rSlider.value = String(R);
rValueEl.textContent = String(Math.round(R));

rSlider.addEventListener('input', () => {
    const newR = parseFloat(rSlider.value);
    setR(newR);
});

// View distance slider — controls the intrinsic camera's far plane. Drag it
// down and entities further than the new far plane stop rendering, including
// universal-cover preimages, so wrap copies "naturally" disappear at small R.
const farSlider = document.getElementById('farSlider');
const farValueEl = document.getElementById('farValue');
farSlider.disabled = false;
farSlider.value = String(intrinsicView.camera.far);
farValueEl.textContent = String(Math.round(intrinsicView.camera.far));

function setIntrinsicFar(newFar) {
    intrinsicView.camera.far = newFar;
    intrinsicView.camera.updateProjectionMatrix();
    farValueEl.textContent = String(Math.round(newFar));
    // Re-fit clone counts; visible preimages depend on far.
    const target = maxPreimagesForR(R);
    for (const e of entities) fitCloneCount(e, target);
}

farSlider.addEventListener('input', () => {
    setIntrinsicFar(parseFloat(farSlider.value));
});

// Quick-jump buttons: snap the View distance to half-lap (πR — antipode)
// or full-lap (2πR — back to yourself). Compute against the current R so
// the buttons retarget when R changes.
function setFarToLaps(laps) {
    const target = laps * 2 * Math.PI * R;
    const min = parseFloat(farSlider.min);
    const max = parseFloat(farSlider.max);
    const clamped = Math.max(min, Math.min(max, target));
    farSlider.value = String(clamped);
    setIntrinsicFar(clamped);
}
document.getElementById('farHalfBtn').addEventListener('click', () => setFarToLaps(0.5));
document.getElementById('farFullBtn').addEventListener('click', () => setFarToLaps(1.0));

// Walker height slider — lifts the red and blue walkers above the surface.
// They keep walking along their great circles; just at higher h.
const walkerHSlider = document.getElementById('walkerHSlider');
const walkerHValueEl = document.getElementById('walkerHValue');
walkerHSlider.disabled = false;
walkerHSlider.addEventListener('input', () => {
    const newH = parseFloat(walkerHSlider.value);
    walkerHValueEl.textContent = String(Math.round(newH));
    for (const w of walkers) w.h = newH;
});

function setR(newR) {
    const oldR = R;
    R = newR;
    GLOBAL_R_UNIFORM.value = R;  // every embedding material + ground shader sees this
    rValueEl.textContent = String(Math.round(R));
    extrinsicView.sphere.scale.setScalar(R / R_INITIAL);
    const ratio = newR / oldR;
    extrinsicView.orbit.radius = Math.max(R * 1.1, Math.min(R * 20, extrinsicView.orbit.radius * ratio));
    extrinsicView.camera.far = R * 50;
    extrinsicView.camera.updateProjectionMatrix();
    extrinsicView.applyOrbit();
    // Re-fit each entity's clone array to the number of preimages this R
    // can actually make visible. Most R values need far fewer than the cap.
    const target = maxPreimagesForR(R);
    for (const e of entities) fitCloneCount(e, target);
}

// ===== Coordinate readout =====
const coordsThetaEl = document.getElementById('coordsTheta');
const coordsPhiEl   = document.getElementById('coordsPhi');
function updateCoordsReadout() {
    const up = world.frame.up();
    const phi = Math.asin(Math.max(-1, Math.min(1, up.y)));
    const theta = Math.atan2(up.z, up.x);
    coordsThetaEl.textContent = (theta * 180 / Math.PI).toFixed(1);
    coordsPhiEl.textContent   = (phi   * 180 / Math.PI).toFixed(1);
}

// Selection HUD — polled each frame from the loop.
const selectionPanelEl = document.getElementById('hudSelection');
const selectionLabelEl = document.getElementById('selectionLabel');
function entityLabel(e) {
    if (e.label) return e.label;
    return e.kind.charAt(0).toUpperCase() + e.kind.slice(1);
}
function refreshSelectionHUD() {
    const sel = extrinsicView.getSelection();
    if (!sel) {
        if (selectionPanelEl.style.display !== 'none') selectionPanelEl.style.display = 'none';
        return;
    }
    if (selectionPanelEl.style.display === 'none') selectionPanelEl.style.display = '';
    const label = (sel.kind === 'planet') ? 'Planet' : entityLabel(sel.entity);
    if (selectionLabelEl.textContent !== label) selectionLabelEl.textContent = label;
}

window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
        keys[k] = true;
        e.preventDefault();
        return;
    }
    if ((k === ' ' || e.code === 'Space') && pointerLocked) {
        if (world.grounded) {
            world.vh = JUMP_VEL;
            world.grounded = false;
        }
        e.preventDefault();
    }
});
window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
        keys[k] = false;
        e.preventDefault();
    }
});

function findHighestGroundUnder() {
    const playerUp = world.frame.up();
    let level = 0;  // ground at h=0 always
    for (const e of entities) {
        if (e.kind !== 'platform') continue;
        const cosArc = Math.max(-1, Math.min(1, playerUp.dot(e.upWorld)));
        const arc = R * Math.acos(cosArc);
        if (arc > e.footprintRadius) continue;
        const platTop = e.h + e.height;
        // A platform supports the player if its top is at or below the
        // player's current height (within tolerance).
        if (platTop > level && platTop <= world.h + 0.02) {
            level = platTop;
        }
    }
    return level;
}

function integrate(dt) {
    // Camera azimuth (mouse-X): independent of player facing.
    if (camAzimAccum !== 0) {
        world.cameraAzim += camAzimAccum;
        camAzimAccum = 0;
    }
    // Camera elevation (mouse-Y): clamped.
    if (pitchAccum !== 0) {
        world.pitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, world.pitch + pitchAccum));
        pitchAccum = 0;
    }

    // WASD movement, camera-relative. Aligning the character to the
    // movement direction is the modern third-person convention; A/D no
    // longer turn in place.
    const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
    const moveZ = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
    if (moveX !== 0 || moveZ !== 0) {
        // The CAMERA's screen-aligned world axes (in the horizontal tangent
        // plane), computed directly from cameraAzim and the player frame:
        //   camFwd   = -sin(α)·right + cos(α)·forward     (camera looks at player)
        //   camRight =  cos(α)·right + sin(α)·forward     (camFwd × up)
        // These axes stay fixed in world while cameraAzim is compensated for
        // the character's auto-turn, so WASD doesn't oscillate. (Using
        // cameraSurfaceFrame.right here was wrong: that's the PLAYER's right
        // parallel-transported, which rotates with the player frame and
        // creates a feedback loop where pressing A makes the character chase
        // its own rotating reference axis — the "spin like crazy" symptom.)
        const cosAz = Math.cos(world.cameraAzim);
        const sinAz = Math.sin(world.cameraAzim);
        const pR = world.frame.right();
        const pF = world.frame.forward();
        const pU = world.frame.up().clone();
        // camFwd · moveScalar(-moveZ) + camRight · moveScalar(moveX)
        // expanded into player-frame contributions:
        const rWeight = moveX * cosAz - (-moveZ) * sinAz;
        const fWeight = moveX * sinAz + (-moveZ) * cosAz;
        _moveDirWorld.set(0, 0, 0)
            .addScaledVector(pR, rWeight)
            .addScaledVector(pF, fWeight);
        _moveDirWorld.addScaledVector(pU, -pU.dot(_moveDirWorld));
        if (_moveDirWorld.lengthSq() > 1e-6) {
            _moveDirWorld.normalize();
            _oldFwd.copy(world.frame.forward());
            setFrameFromUpForward(world.frame, pU, _moveDirWorld);
            // Compensate cameraAzim so the camera's world bearing is unchanged
            // by the character's snap-rotation. Signed angle (oldFwd → newFwd)
            // around pU, decremented from cameraAzim.
            const newFwd = world.frame.forward();
            _crossTmp.crossVectors(_oldFwd, newFwd);
            const sinA = _crossTmp.dot(pU);
            const cosA = _oldFwd.dot(newFwd);
            world.cameraAzim -= Math.atan2(sinA, cosA);
            // Walk forward.
            world.frame.rotateAround(world.frame.right(), -WALK_SPEED * dt / R);
        }
    }

    // Vertical physics: gravity, ground/platform collision.
    const support = findHighestGroundUnder();
    if (world.grounded) {
        if (Math.abs(world.h - support) < 0.5) {
            world.h = support;  // stick to the surface
        } else {
            // The surface fell out from under us (walked off a platform).
            world.grounded = false;
        }
    }
    if (!world.grounded) {
        const prevH = world.h;
        world.vh -= GRAVITY * dt;
        world.h += world.vh * dt;
        // Find any surface we crossed this frame while falling (CCD).
        let landAt = -Infinity;
        if (prevH >= 0 && world.h <= 0 && world.vh <= 0) landAt = 0;
        const playerUp = world.frame.up();
        for (const e of entities) {
            if (e.kind !== 'platform') continue;
            const cosArc = Math.max(-1, Math.min(1, playerUp.dot(e.upWorld)));
            const arc = R * Math.acos(cosArc);
            if (arc > e.footprintRadius) continue;
            const platTop = e.h + e.height;
            if (prevH >= platTop - 0.01 && world.h <= platTop && world.vh <= 0) {
                if (platTop > landAt) landAt = platTop;
            }
        }
        if (landAt > -Infinity) {
            world.h = landAt;
            world.vh = 0;
            world.grounded = true;
        }
    }
}

// ===== Fullscreen button =====
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
});
document.addEventListener('fullscreenchange', () => {
    // Resize fires after layout settles
    setTimeout(resizeAll, 0);
});

// ===== Frame loop =====
let lastTime = performance.now();
function loop(now) {
    if (now === undefined) now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt > 0.05) dt = 0.05;  // clamp on tab-switch / first frame
    integrate(dt);
    world.frame.tick();
    updateCameraSurfaceFrame();
    updateEntities(dt);
    updateCoordsReadout();
    refreshSelectionHUD();
    intrinsicView.render(world);
    extrinsicView.render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
