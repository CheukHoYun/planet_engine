<script type="module">
'use strict';

import * as THREE from 'three';

// ===== Constants =====
const R = 500.0;
const EYE_HEIGHT = 1.7;
const WALK_SPEED = 25.0;            // m/s
const GRID_N = 121;                  // ground patch resolution
const GRID_HALF_ARC = 150.0;         // half-extent of the tangent-plane ground patch, in meters
const PLAYER_COLOR = 0xff5e8a;
const SKY_COLOR = 0x6ca8d4;          // mid-blue, sky in intrinsic view

// ===== Frame: SO(3) state as a Matrix4, columns [right | forward | up] =====
class Frame {
    constructor() {
        this.M = new THREE.Matrix4();
        this._right = new THREE.Vector3();
        this._forward = new THREE.Vector3();
        this._up = new THREE.Vector3();
        this._tmp = new THREE.Matrix4();
        this._frameCount = 0;
    }
    right()   { return this._right.setFromMatrixColumn(this.M, 0); }
    forward() { return this._forward.setFromMatrixColumn(this.M, 1); }
    up()      { return this._up.setFromMatrixColumn(this.M, 2); }
    rotateAround(axis, angle) {
        if (angle === 0) return;
        this._tmp.makeRotationAxis(axis, angle);
        this.M.premultiply(this._tmp);
    }
    // Re-orthonormalize columns to fight float drift. Cheap; call ~once a second.
    reorthogonalize() {
        const e = this.M.elements;
        const r = new THREE.Vector3(e[0], e[1], e[2]).normalize();
        const f = new THREE.Vector3(e[4], e[5], e[6]);
        f.addScaledVector(r, -r.dot(f)).normalize();
        const u = new THREE.Vector3().crossVectors(r, f).normalize();
        e[0] = r.x; e[1] = r.y; e[2] = r.z;
        e[4] = f.x; e[5] = f.y; e[6] = f.z;
        e[8] = u.x; e[9] = u.y; e[10] = u.z;
    }
    tick() {
        if ((++this._frameCount % 60) === 0) this.reorthogonalize();
    }
}

// ===== World state =====
const world = {
    frame: new Frame(),
    pitch: 0
};

// ===== Entity helpers =====
//
// Each entity has a position on the manifold expressed as a unit vector
// `upWorld` (the surface normal where the entity stands) plus a scalar `h`
// (height above the surface). To render in the intrinsic view, project to
// the player's tangent space; in the extrinsic view, place absolutely.

const X_AXIS = new THREE.Vector3(1, 0, 0);
const Y_AXIS = new THREE.Vector3(0, 1, 0);
const Z_AXIS = new THREE.Vector3(0, 0, 1);

// Projects an entity at (upWorld, h) into player-local tangent coords.
// Writes (xLocal, h, zLocal) into `out` (Three.js convention: forward → -Z).
const _pUp = new THREE.Vector3();
const _pRight = new THREE.Vector3();
const _pForward = new THREE.Vector3();
const _pTangent = new THREE.Vector3();
function projectToTangent(upWorld, h, frame, out) {
    _pUp.copy(frame.up());
    _pRight.copy(frame.right());
    _pForward.copy(frame.forward());

    const cosArc = Math.max(-1, Math.min(1, upWorld.dot(_pUp)));
    const arc = R * Math.acos(cosArc);

    _pTangent.copy(upWorld).addScaledVector(_pUp, -cosArc);
    const tlen = _pTangent.length();
    if (tlen < 1e-6) {
        out.set(0, h, 0);
        return out;
    }
    _pTangent.divideScalar(tlen);
    const bRight = _pTangent.dot(_pRight);
    const bForward = _pTangent.dot(_pForward);
    out.set(arc * bRight, h, -arc * bForward);
    return out;
}

// Build an SO(3) frame matrix from an up vector + a forward hint. The
// forward vector is auto-projected onto the tangent plane.
function setFrameFromUpForward(frame, up, forwardHint) {
    const u = up.clone().normalize();
    const f = forwardHint.clone();
    f.addScaledVector(u, -u.dot(f)).normalize();
    const r = new THREE.Vector3().crossVectors(f, u).normalize();
    const e = frame.M.elements;
    e[0] = r.x; e[1] = r.y; e[2] = r.z; e[3] = 0;
    e[4] = f.x; e[5] = f.y; e[6] = f.z; e[7] = 0;
    e[8] = u.x; e[9] = u.y; e[10] = u.z; e[11] = 0;
    e[12] = 0;  e[13] = 0;  e[14] = 0;   e[15] = 1;
}

// Spawn-relative unit vector: a position offset by (forwardArc, rightArc)
// arc-meters from the player's spawn (identity frame, up = +Z, forward = +Y,
// right = +X). For initial entity placement only.
function arcUp(forwardArc, rightArc) {
    const v = new THREE.Vector3(0, 0, 1);
    if (forwardArc !== 0) v.applyAxisAngle(X_AXIS, -forwardArc / R);
    if (rightArc   !== 0) v.applyAxisAngle(Y_AXIS,  rightArc   / R);
    return v;
}

// Project an arbitrary vector hint onto the tangent plane at `upWorld`.
function projectForward(upWorld, hint) {
    const f = hint.clone();
    f.addScaledVector(upWorld, -upWorld.dot(f)).normalize();
    return f;
}

// Place an entity's extrinsic mesh at (R+h)·upWorld with +Y aligned to upWorld.
function placeExtrinsicMesh(mesh, upWorld, h) {
    mesh.position.copy(upWorld).multiplyScalar(R + h);
    mesh.quaternion.setFromUnitVectors(Y_AXIS, upWorld);
}

// Walker placement uses the full SO(3) frame so the cube faces its motion direction.
const _exMat = new THREE.Matrix4();
function placeExtrinsicMeshOriented(mesh, frame, h) {
    const r = frame.right();
    const u = frame.up();
    const f = frame.forward();
    _exMat.makeBasis(r, u, f);
    mesh.quaternion.setFromRotationMatrix(_exMat);
    mesh.position.copy(u).multiplyScalar(R + h);
}

// ===== Grid shaders =====
//
// EXTRINSIC view (right panel): a sphere of radius R rendered with standard
// Three.js perspective. Fragment colors a lat/lon grid from the world-space
// vertex direction.
//
// INTRINSIC view (left panel): the ground IS a flat plane in the player's
// tangent space. There is no sphere, no curve, no embedding — the geometry
// is genuinely flat and rendered with a standard Three.js camera. The
// curvature appears only in the texture: each fragment computes the
// (θ, φ) it corresponds to on the manifold via the exponential map
// (Rodrigues rotation of the player's up vector toward the bearing of the
// fragment, by angle d/R), then stripes the grid from that.
//
// The horizon is flat because the geometry is flat. The curvature is
// visible only as grid-line convergence near the poles.

// --- Extrinsic ---
const EXTRINSIC_VERTEX_SHADER = `
    varying vec3 vWorldPos;
    void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const EXTRINSIC_FRAGMENT_SHADER = `
    precision highp float;
    varying vec3 vWorldPos;
    void main() {
        vec3 n = normalize(vWorldPos);
        float phi = asin(clamp(n.y, -1.0, 1.0));
        float theta = atan(n.z, n.x);
        float gridLat = smoothstep(0.94, 0.96, abs(cos(phi * 40.0)));
        float gridLon = smoothstep(0.94, 0.96, abs(cos(theta * 40.0)));
        float grid = max(gridLat, gridLon);
        vec3 color = mix(vec3(0.25, 0.5, 0.2), vec3(0.1, 0.2, 0.08), grid);
        gl_FragColor = vec4(color, 1.0);
    }
`;

// --- Intrinsic ---
// Trivial passthrough vertex shader. The mesh's vertex positions ARE the
// player-local tangent-plane positions; standard Three.js perspective then
// renders them correctly because the geometry is genuinely flat.
const INTRINSIC_VERTEX_SHADER = `
    varying vec3 vTangentPos;
    void main() {
        vTangentPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

// Fragment computes the exponential map: which point on the manifold does
// this tangent-space fragment correspond to? Then derives (θ, φ) and stripes.
const INTRINSIC_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3 uPlayerRight;
    uniform vec3 uPlayerForward;
    uniform vec3 uPlayerUp;
    uniform float uR;
    varying vec3 vTangentPos;
    void main() {
        // vTangentPos is in the mesh's local frame: +X = right, +Y = up,
        // +Z is behind the camera (Three.js convention). Recover signed
        // forward arc.
        float arcX = vTangentPos.x;
        float arcZ = -vTangentPos.z;
        float d = sqrt(arcX * arcX + arcZ * arcZ);

        vec3 hitPoint;
        if (d < 1e-3) {
            hitPoint = uPlayerUp;
        } else {
            float bearing = atan(arcX, arcZ);
            vec3 tangentDir = sin(bearing) * uPlayerRight + cos(bearing) * uPlayerForward;
            float angle = d / uR;
            // Rodrigues: rotate uPlayerUp toward tangentDir by angle. Since
            // uPlayerUp ⟂ tangentDir, this collapses to the simple form.
            hitPoint = uPlayerUp * cos(angle) + tangentDir * sin(angle);
        }

        float phi = asin(clamp(hitPoint.y, -1.0, 1.0));
        float theta = atan(hitPoint.z, hitPoint.x);
        float gridLat = smoothstep(0.94, 0.96, abs(cos(phi * 40.0)));
        float gridLon = smoothstep(0.94, 0.96, abs(cos(theta * 40.0)));
        float grid = max(gridLat, gridLon);
        vec3 color = mix(vec3(0.25, 0.5, 0.2), vec3(0.1, 0.2, 0.08), grid);
        gl_FragColor = vec4(color, 1.0);
    }
`;

function extrinsicGridMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader: EXTRINSIC_VERTEX_SHADER,
        fragmentShader: EXTRINSIC_FRAGMENT_SHADER,
        side: THREE.FrontSide
    });
}

function intrinsicGridMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader: INTRINSIC_VERTEX_SHADER,
        fragmentShader: INTRINSIC_FRAGMENT_SHADER,
        side: THREE.FrontSide,
        uniforms: {
            uPlayerRight:   { value: new THREE.Vector3(1, 0, 0) },
            uPlayerForward: { value: new THREE.Vector3(0, 1, 0) },
            uPlayerUp:      { value: new THREE.Vector3(0, 0, 1) },
            uR:             { value: R }
        }
    });
}

// ===== Extrinsic full sphere =====
function buildExtrinsicSphere(radius) {
    const geo = new THREE.SphereGeometry(radius, 96, 64);
    const mat = extrinsicGridMaterial();
    return new THREE.Mesh(geo, mat);
}

// ===== Ground patch: a static flat plane in the player's tangent space.
// Generated once at startup. The geometry never changes — the player frame
// uniforms drive the shader, which is what makes the world appear to move.
function buildGroundPatch() {
    const N = GRID_N;
    const positions = new Float32Array(N * N * 3);
    const indices = new Uint32Array((N - 1) * (N - 1) * 6);
    let idx = 0;
    for (let j = 0; j < N; j++) {
        const arcZ = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (j / (N - 1));
        for (let i = 0; i < N; i++) {
            const arcX = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (i / (N - 1));
            positions[idx++] = arcX;       // +X = right
            positions[idx++] = 0;          // ground plane y=0; camera sits at y=EYE_HEIGHT
            positions[idx++] = -arcZ;      // forward → -Z (Three.js convention)
        }
    }
    let k = 0;
    for (let j = 0; j < N - 1; j++) {
        for (let i = 0; i < N - 1; i++) {
            const a = j * N + i;
            const b = a + 1;
            const c = a + N;
            const d = c + 1;
            // CCW from above (camera looks down -Y onto ground at y=0).
            indices[k++] = a; indices[k++] = b; indices[k++] = c;
            indices[k++] = b; indices[k++] = d; indices[k++] = c;
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeBoundingSphere();

    const material = intrinsicGridMaterial();
    const mesh = new THREE.Mesh(geo, material);

    return { mesh, material };
}

// ===== Entity factories =====
//
// Each factory returns
//   { kind, intrinsicMesh, extrinsicMesh, upWorld, h, ... }
// with the meshes always built so that local +Y is "up" and the group's
// origin sits at the entity's base height. Walkers carry their own SO(3)
// frame and read upWorld from it each frame instead.

const COLOR_WALKER_RED   = 0xe84c4c;
const COLOR_WALKER_GREEN = 0x4ce8a8;
const COLOR_TRUNK        = 0x7a4a22;
const COLOR_CANOPY       = 0x2f8a3f;
const COLOR_CANOPY_LIGHT = 0x3fa64f;
const COLOR_SMILEY       = 0xffd84a;
const COLOR_SMILEY_DARK  = 0x222222;
const COLOR_PLATFORM_BASE = 0x7a4a22;
const COLOR_PLATFORM_TOP  = 0x3a8c3a;
const POLE_COLORS = [
    0xe84c4c, 0xf0f0f0, 0x4c8ae8, 0xf0f0f0, 0xe8c84c,
    0xf0f0f0, 0x4ce884, 0xf0f0f0, 0xc084ff, 0xf0f0f0
];

// Walker — solid colored cube. Matches 2D exactly: no eyes or other features.
function makeWalker(color, walkSpeed, upWorld, forwardHint) {
    const W = 20;
    const H = 24;
    const geo = new THREE.BoxGeometry(W, H, W);
    const mat = new THREE.MeshBasicMaterial({ color });

    const make = () => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(geo, mat);
        body.position.y = H / 2;
        g.add(body);
        return g;
    };

    const frame = new Frame();
    setFrameFromUpForward(frame, upWorld, forwardHint);

    return {
        kind: 'walker',
        frame,
        intrinsicMesh: make(),
        extrinsicMesh: make(),
        h: 0,
        speed: walkSpeed,
        size: W,
        height: H
    };
}

// Tree — matches the 2D prototype's three-circle canopy.
//   trunk: 14×40, brown, sits on the ground
//   main canopy: dark-green sphere, radius 28
//   secondary 1: lighter-green, radius 18, slightly above and to the left
//   secondary 2: lighter-green, radius 16, slightly above and to the right
// 2D positions translated: 2D entity y=0 is top, y=120 is bottom, so
// 2D y=40-from-top → 3D y=80-from-ground in a 120-tall entity.
function makeTree(upWorld) {
    const TRUNK_W = 14;
    const TRUNK_H = 40;

    const trunkGeo = new THREE.BoxGeometry(TRUNK_W, TRUNK_H, TRUNK_W);
    const trunkMat = new THREE.MeshBasicMaterial({ color: COLOR_TRUNK });
    const canopyMainGeo = new THREE.SphereGeometry(28, 24, 16);
    const canopyMainMat = new THREE.MeshBasicMaterial({ color: COLOR_CANOPY });
    const canopy2Geo = new THREE.SphereGeometry(18, 18, 14);
    const canopy3Geo = new THREE.SphereGeometry(16, 18, 14);
    const canopySecMat = new THREE.MeshBasicMaterial({ color: COLOR_CANOPY_LIGHT });

    const make = () => {
        const g = new THREE.Group();
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = TRUNK_H / 2;
        g.add(trunk);
        const canopy = new THREE.Mesh(canopyMainGeo, canopyMainMat);
        canopy.position.y = 80;
        g.add(canopy);
        const canopy2 = new THREE.Mesh(canopy2Geo, canopySecMat);
        canopy2.position.set(-10, 88, 0);
        g.add(canopy2);
        const canopy3 = new THREE.Mesh(canopy3Geo, canopySecMat);
        canopy3.position.set(12, 84, 0);
        g.add(canopy3);
        return g;
    };

    return {
        kind: 'tree',
        intrinsicMesh: make(),
        extrinsicMesh: make(),
        upWorld,
        h: 0
    };
}

function makeSmiley(upWorld, h) {
    const RR = 25;
    const sphereGeo = new THREE.SphereGeometry(RR, 32, 24);
    const sphereMat = new THREE.MeshBasicMaterial({ color: COLOR_SMILEY });
    const eyeGeo = new THREE.SphereGeometry(RR * 0.13, 12, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: COLOR_SMILEY_DARK });
    const mouthGeo = new THREE.TorusGeometry(RR * 0.45, RR * 0.06, 8, 24, Math.PI);
    const mouthMat = new THREE.MeshBasicMaterial({ color: COLOR_SMILEY_DARK });

    const make = () => {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(sphereGeo, sphereMat));
        // Eyes and mouth on the local -Z face so they face the player on spawn.
        const z = -RR * 0.92;
        for (const sx of [-1, 1]) {
            const eye = new THREE.Mesh(eyeGeo, eyeMat);
            eye.position.set(sx * RR * 0.32, RR * 0.20, z);
            g.add(eye);
        }
        // TorusGeometry with arc=π is the upper half-ring (looks like a frown).
        // Rotating by π around Z flips it to a smile (∪).
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.position.set(0, -RR * 0.10, z * 0.97);
        mouth.rotation.z = Math.PI;
        g.add(mouth);
        return g;
    };

    return {
        kind: 'smiley',
        intrinsicMesh: make(),
        extrinsicMesh: make(),
        upWorld,
        h
    };
}

function makeStripedPole(upWorld) {
    const POLE_W = 12;
    const TOTAL_H = 300;
    const N_BANDS = POLE_COLORS.length;
    const BAND_H = TOTAL_H / N_BANDS;
    const bandGeo = new THREE.BoxGeometry(POLE_W, BAND_H, POLE_W);

    const makeIntrinsic = () => {
        const g = new THREE.Group();
        for (let i = 0; i < N_BANDS; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: POLE_COLORS[i] });
            const band = new THREE.Mesh(bandGeo, mat);
            band.position.y = i * BAND_H + BAND_H / 2;
            g.add(band);
        }
        return g;
    };

    // Extrinsic version: each band's width scaled by (R + h_band) / R — the
    // visible "trapezoid" effect of S²×ℝ's product metric. Same arc length is
    // a wider Euclidean width when embedded at greater radius.
    const makeExtrinsic = () => {
        const g = new THREE.Group();
        for (let i = 0; i < N_BANDS; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: POLE_COLORS[i] });
            const band = new THREE.Mesh(bandGeo, mat);
            const cy = i * BAND_H + BAND_H / 2;
            band.position.y = cy;
            const widen = (R + cy) / R;
            band.scale.x = widen;
            band.scale.z = widen;
            g.add(band);
        }
        return g;
    };

    return {
        kind: 'pole',
        intrinsicMesh: makeIntrinsic(),
        extrinsicMesh: makeExtrinsic(),
        upWorld,
        h: 0
    };
}

// Marker — a small colored cylinder, dropped by the player. The marker's
// world position is captured at drop time and never moves.
const MARKER_COLORS = [0xff5e8a, 0x4ce8a8, 0xe84c4c, 0xffd84a, 0xc084ff, 0x4ce884];

function makeMarker(upWorld, color) {
    const RAD = 2.5;
    const HT = 12;
    const geo = new THREE.CylinderGeometry(RAD, RAD, HT, 14);
    const mat = new THREE.MeshBasicMaterial({ color });
    const make = () => {
        const g = new THREE.Group();
        const cyl = new THREE.Mesh(geo, mat);
        cyl.position.y = HT / 2;
        g.add(cyl);
        return g;
    };
    return {
        kind: 'marker',
        intrinsicMesh: make(),
        extrinsicMesh: make(),
        upWorld,
        h: 0
    };
}

function makePlatform(upWorld, h, width, depth, height) {
    const baseH = height * 0.82;
    const topH = height - baseH;
    const baseGeo = new THREE.BoxGeometry(width, baseH, depth);
    const topGeo = new THREE.BoxGeometry(width, topH, depth);
    const baseMat = new THREE.MeshBasicMaterial({ color: COLOR_PLATFORM_BASE });
    const topMat = new THREE.MeshBasicMaterial({ color: COLOR_PLATFORM_TOP });

    const make = () => {
        const g = new THREE.Group();
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = baseH / 2;
        g.add(base);
        const top = new THREE.Mesh(topGeo, topMat);
        top.position.y = baseH + topH / 2;
        g.add(top);
        return g;
    };

    return {
        kind: 'platform',
        intrinsicMesh: make(),
        extrinsicMesh: make(),
        upWorld,
        h
    };
}

// ===== Extrinsic view: scene, camera, renderer, inline orbit controls =====
function makeExtrinsicView(canvas) {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a10);

    const sphere = buildExtrinsicSphere(R);
    scene.add(sphere);

    // Player marker — a pink cube with white eyes, dark pupils, and a thin
    // dark-pink belt — matching the 2D player exactly. ~22×30×22 units.
    const PLAYER_W = 22;
    const PLAYER_H = 30;
    const PLAYER_BELT_COLOR = 0x7a2848;
    const playerMarker = new THREE.Group();
    {
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(PLAYER_W, PLAYER_H, PLAYER_W),
            new THREE.MeshBasicMaterial({ color: PLAYER_COLOR })
        );
        body.position.y = PLAYER_H / 2;
        playerMarker.add(body);
        // Belt: thin dark-pink horizontal stripe at h*0.6 (matching 2D).
        const beltH = 1.5;
        const belt = new THREE.Mesh(
            new THREE.BoxGeometry(PLAYER_W + 0.2, beltH, PLAYER_W + 0.2),
            new THREE.MeshBasicMaterial({ color: PLAYER_BELT_COLOR })
        );
        belt.position.y = PLAYER_H * 0.6;
        playerMarker.add(belt);
        // Eyes: white rectangles 4×5, on the -Z (front) face.
        const eyeGeo = new THREE.BoxGeometry(4, 5, 0.4);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const pupilGeo = new THREE.BoxGeometry(2, 3, 0.2);
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeY = PLAYER_H * 0.75;
        const eyeZ = -PLAYER_W / 2 - 0.1;
        for (const sx of [-1, 1]) {
            const eye = new THREE.Mesh(eyeGeo, eyeMat);
            eye.position.set(sx * PLAYER_W * 0.2, eyeY, eyeZ);
            playerMarker.add(eye);
            const pupil = new THREE.Mesh(pupilGeo, pupilMat);
            pupil.position.set(sx * PLAYER_W * 0.2, eyeY, eyeZ - 0.3);
            playerMarker.add(pupil);
        }
    }
    scene.add(playerMarker);

    const camera = new THREE.PerspectiveCamera(45, 1, 1, R * 50);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Orbit state
    const orbit = {
        azimuth: 0.6,
        elevation: 0.4,
        radius: R * 2.5,
        dragging: false,
        lastX: 0,
        lastY: 0
    };

    function applyOrbit() {
        const ce = Math.cos(orbit.elevation);
        const se = Math.sin(orbit.elevation);
        const ca = Math.cos(orbit.azimuth);
        const sa = Math.sin(orbit.azimuth);
        camera.position.set(
            orbit.radius * ce * sa,
            orbit.radius * se,
            orbit.radius * ce * ca
        );
        camera.lookAt(0, 0, 0);
    }
    applyOrbit();

    canvas.style.cursor = 'grab';
    canvas.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        orbit.dragging = true;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = 'grabbing';
    });
    canvas.addEventListener('pointermove', (e) => {
        if (!orbit.dragging) return;
        const dx = e.clientX - orbit.lastX;
        const dy = e.clientY - orbit.lastY;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        orbit.azimuth -= dx * 0.005;
        orbit.elevation = Math.max(-1.4, Math.min(1.4, orbit.elevation + dy * 0.005));
        applyOrbit();
    });
    function endDrag(e) {
        if (!orbit.dragging) return;
        orbit.dragging = false;
        try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
        canvas.style.cursor = 'grab';
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = Math.exp(e.deltaY * 0.0012);
        orbit.radius = Math.max(R * 1.1, Math.min(R * 20, orbit.radius * factor));
        applyOrbit();
    }, { passive: false });

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    const _markerMat = new THREE.Matrix4();

    function render(world) {
        if (world) {
            // Place the player marker as a proper basis-oriented cube on the
            // sphere: +Y aligned to up_world, -Z (front of cube) aligned to
            // walking forward direction.
            const r = world.frame.right();
            const u = world.frame.up();
            const f = world.frame.forward();
            _markerMat.makeBasis(r, u, f);
            playerMarker.quaternion.setFromRotationMatrix(_markerMat);
            playerMarker.position.copy(u).multiplyScalar(R);
        }
        renderer.render(scene, camera);
    }

    return { scene, camera, renderer, sphere, playerMarker, resize, render };
}

// ===== Intrinsic view: standard Three.js camera looking at a flat plane.
// The world is genuinely flat from the inhabitant's POV; no spherical
// geometry exists in this scene. Yaw is carried by the SO(3) frame uniforms
// pushed to the ground shader; pitch is the only camera rotation.
function makeIntrinsicView(canvas) {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SKY_COLOR);

    const ground = buildGroundPatch();
    scene.add(ground.mesh);

    const camera = new THREE.PerspectiveCamera(70, 1, 0.1, GRID_HALF_ARC * 4);
    camera.position.set(0, EYE_HEIGHT, 0);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    function placeCamera(world) {
        camera.rotation.set(-world.pitch, 0, 0);
    }

    function updateGroundUniforms(world) {
        const u = ground.material.uniforms;
        u.uPlayerRight.value.copy(world.frame.right());
        u.uPlayerForward.value.copy(world.frame.forward());
        u.uPlayerUp.value.copy(world.frame.up());
        u.uR.value = R;
    }

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function render(world) {
        updateGroundUniforms(world);
        placeCamera(world);
        renderer.render(scene, camera);
    }

    return { scene, camera, renderer, ground, resize, render };
}

// ===== Bootstrap =====
const intrinsicCanvas = document.getElementById('intrinsicCanvas');
const extrinsicCanvas = document.getElementById('extrinsicCanvas');

const intrinsicView = makeIntrinsicView(intrinsicCanvas);
const extrinsicView = makeExtrinsicView(extrinsicCanvas);

function resizeAll() {
    intrinsicView.resize();
    extrinsicView.resize();
}
window.addEventListener('resize', resizeAll);
resizeAll();

// ===== Spawn entities =====
const entities = [];
const walkers = [];

function addEntity(e) {
    entities.push(e);
    if (e.kind === 'walker') walkers.push(e);
    intrinsicView.scene.add(e.intrinsicMesh);
    extrinsicView.scene.add(e.extrinsicMesh);
}

// Walkers wander on great circles. Initial positions and speeds are arbitrary.
addEntity(makeWalker(
    COLOR_WALKER_RED, 12,
    arcUp(20, 40), projectForward(arcUp(20, 40), Y_AXIS)
));
addEntity(makeWalker(
    COLOR_WALKER_GREEN, -8,
    arcUp(50, -30), projectForward(arcUp(50, -30), X_AXIS)
));

// Static landmarks
addEntity(makeTree(arcUp(45, -55)));
addEntity(makeSmiley(arcUp(95, 30), 180));
addEntity(makeStripedPole(arcUp(15, 75)));

// Platforms
addEntity(makePlatform(arcUp(-20, 25), 0, 30, 30, 14));
addEntity(makePlatform(arcUp(-35, -45), 0, 25, 40, 12));
addEntity(makePlatform(arcUp(70, -10), 0, 22, 22, 18));

const _entityPos = new THREE.Vector3();

function updateEntities(dt) {
    // Walkers walk along their own great circles. Walking forward = rotate
    // their frame around right by -v·dt/R, same as the player.
    for (const w of walkers) {
        w.frame.rotateAround(w.frame.right(), -w.speed * dt / R);
        if ((w._tickCount = (w._tickCount || 0) + 1) % 60 === 0) {
            w.frame.reorthogonalize();
        }
    }
    // Place each entity in both scenes.
    for (const e of entities) {
        const upW = (e.kind === 'walker') ? e.frame.up() : e.upWorld;
        // Intrinsic: tangent-space projection. Local +Y of mesh stays vertical.
        projectToTangent(upW, e.h, world.frame, _entityPos);
        e.intrinsicMesh.position.copy(_entityPos);
        // Extrinsic: absolute placement on the embedded sphere.
        if (e.kind === 'walker') {
            placeExtrinsicMeshOriented(e.extrinsicMesh, e.frame, e.h);
        } else {
            placeExtrinsicMesh(e.extrinsicMesh, e.upWorld, e.h);
        }
    }
}

// ===== Input: pointer lock on intrinsic canvas, keyboard, mouselook =====
const keys = { w: false, a: false, s: false, d: false };
let pointerLocked = false;
let yawAccum = 0;
let pitchAccum = 0;
const MOUSE_SENSITIVITY = 0.002;
const PITCH_LIMIT = 1.483;  // ~85°

intrinsicCanvas.addEventListener('click', () => {
    if (!pointerLocked) intrinsicCanvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === intrinsicCanvas;
});
document.addEventListener('mousemove', (e) => {
    if (!pointerLocked) return;
    yawAccum   += e.movementX * MOUSE_SENSITIVITY;
    pitchAccum += e.movementY * MOUSE_SENSITIVITY;
});

const markerCountEl = document.getElementById('markerCount');
let markerCount = 0;

function dropMarker() {
    const upClone = world.frame.up().clone();
    const color = MARKER_COLORS[Math.floor(Math.random() * MARKER_COLORS.length)];
    addEntity(makeMarker(upClone, color));
    markerCount += 1;
    markerCountEl.textContent = String(markerCount);
}

window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
        keys[k] = true;
        e.preventDefault();
        return;
    }
    if ((k === ' ' || e.code === 'Space') && pointerLocked) {
        dropMarker();
        e.preventDefault();
    }
});
window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
        keys[k] = false;
        e.preventDefault();
    }
});

function integrate(dt) {
    // Yaw: rotate frame around its own up by -yawAccum (mouse-right -> look right)
    if (yawAccum !== 0) {
        world.frame.rotateAround(world.frame.up(), -yawAccum);
        yawAccum = 0;
    }
    // Pitch: scalar, camera-only, clamped. Convention: pitch > 0 = look down,
    // matching the camera setup `rotation.x = -pitch`. Mouse-down (positive
    // movementY) increases pitch.
    if (pitchAccum !== 0) {
        world.pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, world.pitch + pitchAccum));
        pitchAccum = 0;
    }
    // Walk: rotate around right. -angle moves player toward +forward (premultiply convention)
    const walkSign = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
    if (walkSign !== 0) {
        world.frame.rotateAround(world.frame.right(), -walkSign * WALK_SPEED * dt / R);
    }
    // Strafe: rotate around forward. +angle moves player toward +right (D)
    const strafeSign = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
    if (strafeSign !== 0) {
        world.frame.rotateAround(world.frame.forward(), strafeSign * WALK_SPEED * dt / R);
    }
}

// ===== Fullscreen button =====
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
});
document.addEventListener('fullscreenchange', () => {
    // Resize fires after layout settles
    setTimeout(resizeAll, 0);
});

// ===== Frame loop =====
let lastTime = performance.now();
function loop(now) {
    if (now === undefined) now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt > 0.05) dt = 0.05;  // clamp on tab-switch / first frame
    integrate(dt);
    world.frame.tick();
    updateEntities(dt);
    intrinsicView.render(world);
    extrinsicView.render(world);
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
