<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Möbius × ℝ Engine — 3D Prototype</title>
<style>
    html, body {
        margin: 0; padding: 0; height: 100%;
        background: #050608; color: #e8eaef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        /* Prevent wheel/touch scrolls from chaining out of this iframe to
           the host page (WP post, etc.) — without this, scroll events fall
           through to the parent once the iframe content can't scroll. */
        overscroll-behavior: none;
    }
    body { display: flex; flex-direction: column; }
    #panels { flex: 1 1 auto; display: flex; min-height: 0; }
    .panel { flex: 1 1 50%; position: relative; border-left: 1px solid #1a1d23; }
    .panel:first-child { border-left: none; }
    canvas { display: block; width: 100%; height: 100%; }
    #intrinsicCanvas { background: linear-gradient(to bottom, #3a6ea5 0%, #9bc4e2 100%); }
    #extrinsicCanvas { background: radial-gradient(circle at center, #0e1218 0%, #050608 90%); }

    /* Floating glass panels embedded in each view. */
    .hud {
        position: absolute;
        background: rgba(15, 18, 24, 0.62);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        padding: 10px 14px;
        color: #e8eaef;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        user-select: none;
        box-shadow: 0 6px 28px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
    }
    .hud .row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
    .hud .row.buttons { justify-content: flex-end; gap: 6px; margin-top: 2px; }
    .hud .row .label { width: 60px; color: #94a3b8; font-size: 12px; letter-spacing: 0.01em; }
    .hud .row .value {
        min-width: 44px; text-align: right;
        font-variant-numeric: tabular-nums;
        color: #e8eaef; font-size: 12px;
    }

    /* Buttons */
    .hud button, button.ghost {
        background: rgba(255, 255, 255, 0.06);
        color: #e8eaef;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 4px 11px;
        font: 12px/1.2 -apple-system, system-ui, sans-serif;
        cursor: pointer;
        transition: background 120ms, border-color 120ms;
    }
    .hud button:hover, button.ghost:hover {
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.22);
    }
    .hud button:active { background: rgba(255, 255, 255, 0.20); }

    /* Custom range slider */
    input[type="range"].slider {
        -webkit-appearance: none; appearance: none;
        flex: 1 1 auto; min-width: 110px;
        height: 18px; background: transparent;
        cursor: pointer;
    }
    input[type="range"].slider:disabled { opacity: 0.4; cursor: default; }
    input[type="range"].slider::-webkit-slider-runnable-track {
        height: 3px; background: rgba(255, 255, 255, 0.16);
        border-radius: 2px;
    }
    input[type="range"].slider::-moz-range-track {
        height: 3px; background: rgba(255, 255, 255, 0.16);
        border-radius: 2px; border: 0;
    }
    input[type="range"].slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 14px; height: 14px; margin-top: -5.5px;
        background: #f8fafc; border-radius: 50%;
        cursor: pointer; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
    }
    input[type="range"].slider::-moz-range-thumb {
        width: 14px; height: 14px;
        background: #f8fafc; border: 0; border-radius: 50%;
        cursor: pointer; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
    }

    /* Specific panel placements */
    #hudCoords {
        top: 14px; left: 14px;
        font-variant-numeric: tabular-nums;
        font-size: 14px; padding: 8px 14px;
        letter-spacing: 0.02em;
    }
    #hudCoords .axis { color: #94a3b8; margin-right: 4px; font-size: 11px; }
    #hudCoords .sep { display: inline-block; width: 14px; }
    #hudCoords .side {
        display: inline-block; margin-left: 14px;
        padding: 1px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.04em;
    }
    #hudCoords .side.A { background: rgba(232, 76, 76, 0.18); color: #ff8e8e; border: 1px solid rgba(232, 76, 76, 0.45); }
    #hudCoords .side.B { background: rgba(76, 138, 232, 0.18); color: #8fb6ff; border: 1px solid rgba(76, 138, 232, 0.45); }

    #hudHelp, #hudControls {
        bottom: 14px;
        font-size: 11.5px;
        padding: 8px 12px;
        opacity: 0.92;
    }
    #hudHelp { left: 14px; }
    #hudControls { right: 14px; }
    .key-row { display: flex; align-items: center; gap: 9px; margin: 3px 0; }
    .key-row .keys {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10.5px;
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 4px;
        padding: 1px 7px;
        min-width: 32px;
        text-align: center;
        letter-spacing: 0.02em;
    }

    #hudSettings {
        top: 56px; right: 14px;
        min-width: 248px;
    }
    #hudSettings.collapsed { display: none; }

    /* Gear button — toggles the settings HUD */
    #settingsBtn {
        position: absolute;
        top: 14px; right: 14px;
        width: 30px; height: 30px;
        padding: 0;
        background: rgba(15, 18, 24, 0.62);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 6px;
        color: rgba(255, 255, 255, 0.78);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 120ms, color 120ms, border-color 120ms;
        z-index: 5;
    }
    #settingsBtn:hover {
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.22);
    }
    #settingsBtn.active {
        background: rgba(255, 255, 255, 0.16);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.30);
    }
    #settingsBtn svg { width: 16px; height: 16px; }
    #hudSettings .heading {
        font-size: 11px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 2px 0 6px;
        font-weight: 600;
    }

    #hudSelection {
        bottom: 14px; left: 14px;
        background: rgba(255, 224, 90, 0.12);
        border-color: rgba(255, 224, 90, 0.35);
        color: #ffe05a;
        font-size: 12px;
        padding: 7px 12px;
    }
    #hudSelection .name { color: #fff5b8; font-weight: 600; }
    #hudSelection .hint { color: rgba(255, 224, 90, 0.65); margin-left: 8px; font-size: 11px; }

    #fullscreenBtn {
        position: fixed; right: 14px; bottom: 14px;
        width: 30px; height: 30px;
        padding: 0; border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(15, 18, 24, 0.62);
        backdrop-filter: blur(16px);
        color: rgba(255, 255, 255, 0.55);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s ease;
        z-index: 10;
    }
    #fullscreenBtn:hover {
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.95);
        border-color: rgba(255, 255, 255, 0.2);
    }
    #fullscreenBtn svg { width: 16px; height: 16px; }

    /* State snapshot panel (T-key) */
    #hudSnapshot {
        position: fixed;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        max-width: 640px;
        max-height: 80vh;
        overflow: auto;
        background: rgba(15, 18, 24, 0.92);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        padding: 14px 18px;
        color: #e8eaef;
        font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        white-space: pre;
        z-index: 50;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.65);
        user-select: text;
    }
    #hudSnapshot .title {
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 11px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        font-weight: 600;
    }
</style>

            </svg>
        </button>
        <div class="hud collapsed" id="hudSettings">

            <div class="row buttons">
                <button id="farHalfBtn" title="View distance = πR (mid-lap, where the world is mirrored)">½ lap</button>

            </div>
            <div class="row" style="margin-top: 8px;">

<script type="importmap">
{
    "imports": {
        "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }

<script type="module">
'use strict';

import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

// ========================================================================
//  M ö b i u s   ×   ℝ    E n g i n e
// ========================================================================
//
// The world is a Möbius strip (central radius R, half-width W) crossed with
// a height axis. Intrinsically flat — no curvature, no Christoffel symbols,
// no Rodrigues. The only non-trivial fact is the deck transformation
//
//     (u, v, h) ~ (u + L, -v, -h),    L = 2πR
//
// which makes the manifold non-orientable. The single self-consistency
// relation (-h)·(-n) = h·n (n = the embedding's surface normal, which also
// flips after one lap) lets us carry h as a SIGNED quantity through the
// wrap without snapping any embedded position.
//
// Architecture mirrors the sphere prototype in ../3D/: dual views (intrinsic
// tangent plane + extrinsic embedding), per-entity preimage clones for the
// universal cover, the same UI panels and Unity-style camera. SO(3) state
// is replaced by (u, v, β, h, vh, parity) — the Möbius strip has no
// coordinate singularities, so raw coords work everywhere.

// ===== Constants =====
// R is the radius of the embedding's central circle — useful for the
// extrinsic visualization but not a quantity the inhabitant cares about.
// L = 2πR is the strip's intrinsic length and the only spatial parameter
// that has meaning to the inhabitant. The UI slider exposes L; R is just
// derived from it.
let   R = 200.0;
let   W = 46.0;                     // strip half-width (m); W slider rebinds
const R_INITIAL = 200.0;
const W_INITIAL = 46.0;
let   L = 2 * Math.PI * R;          // strip length (intrinsic); slider rebinds

const EYE_HEIGHT = 1.7;
const WALK_SPEED = 100.0;           // m/s
const GRAVITY    = 250.0;           // m/s²
const JUMP_VEL   = 220.0;           // m/s
let   ORBIT_RADIUS = 115.49;        // third-person camera distance (mouse wheel)
// Height twist toggle. Mode A (default, "trivial bundle"): h is preserved
// across preimages — every cover-image of an entity stays above the strip
// from the inhabitant's POV; the extrinsic view has a visual "snap" at the
// half-lap. Mode B ("twisted bundle"): h flips on odd preimages — the
// extrinsic embedding is seam-continuous, but odd preimages render upside-
// down below the strip in the intrinsic view. See expert doc.
let   HEIGHT_TWIST = false;
const ORBIT_MIN = 20;
const ORBIT_MAX = 400;

const PLAYER_W = 22;
const PLAYER_H = 30;
const PLAYER_CENTER_Y = 15;
const PLAYER_COLOR      = 0xff5e8a;
const PLAYER_BELT_COLOR = 0x7a2848;

// Tangent-plane patch resolution. The fragment shader does the manifold
// math per pixel; geometry only needs enough verts for linear interpolation
// of vTangentPos. 21×21 is plenty.
const GRID_N = 21;
const GRID_HALF_ARC = 15000.0;      // matches the View slider's max
const DEFAULT_FAR   = 2150.0;

// ===== Player state =====
//
// Fix B (cover representation): u, v, h, β, vh are kept in COVER throughout.
// `u` is unbounded — wrapping is implicit in the rendering's preimage
// enumeration. We periodically take u mod 2L for float hygiene; the deck
// transformation has period 2 (two applications recover the identity), so
// a 2L-shift in u is physically AND orientationally a no-op.
//
// No `parity` bit. The "side A / side B" badge is derived from
// floor(u / L) mod 2 — non-essential bookkeeping, computed only for the HUD.
//
// Why not Fix A (parity-flipping normalize): with Fix A the camera and the
// player can be normalized into deck-equivalent-but-different cover-reps
// across a wrap boundary, and the (u, v) basis at one rep is rotated
// relative to the other (the v-axis is flipped). That makes du/dv
// across-rep meaningless and the camera view jumps at every wrap. Fix B
// avoids the issue entirely by keeping a single consistent cover rep.
const world = {
    u: 422.164, v: -6.269, beta: 0.12,
    h: 72, vh: 0,
    grounded: true,
    pitch: 0.299,
    cameraAzim: Math.PI
};

// Camera-surface state. Lives in COVER too. No normalize, no parity.
const cameraSurface = {
    u: 0, v: 0, beta: 0, h: 0
};

// ===== Light-touch normalization =====
//
// Wraps `u` into [0, 2L) for float hygiene; clamps `v` to [−W, W]. Does
// NOT flip signs of v, β, h, vh — those are cover quantities and the
// deck transform is implicit in the rendering's preimage enumeration.
function normalize(s) {
    const period = 2 * L;
    while (s.u >= period) s.u -= period;
    while (s.u < 0)        s.u += period;
    if (s.v >  W) s.v =  W;
    if (s.v < -W) s.v = -W;
}

// ===== Camera surface point =====
//
// Camera is behind the player at horizontal distance ORBIT_RADIUS·cos(pitch),
// rotated by `cameraAzim` around the player's vertical axis. In strip-coords
// the player's bearing-+π is "behind"; bearing-+π+azim adds the orbit angle.
function updateCameraSurface() {
    const horizDist = ORBIT_RADIUS * Math.cos(world.pitch);
    const camBearing = world.beta + Math.PI + world.cameraAzim;
    cameraSurface.u    = world.u + horizDist * Math.cos(camBearing);
    cameraSurface.v    = world.v + horizDist * Math.sin(camBearing);
    cameraSurface.beta = world.beta + world.cameraAzim;
    // h is the camera-FOOT's height, which is on the strip (h=0) regardless
    // of player jump. The Three.js camera itself rises with the player; that
    // happens in placeCamera. Don't conflate the two.
    cameraSurface.h    = 0;
    // No normalize: cameraSurface is in cover. It can have negative u or u>L
    // — that's fine; preimage enumeration anchors around it.
}

// ===== projectToTangent =====
//
// Given an entity preimage at COVER coords (uCov, vCov, hCov), compute its
// position in the camera's tangent frame (Three.js: +X right, +Y up=cover-h,
// -Z forward in cover bearing).
const _eTangent = new THREE.Vector3();
function projectToTangent(uCov, vCov, hCov, csCovU, csCovV, csCovH, csCovBeta, out) {
    const du = uCov - csCovU;
    const dv = vCov - csCovV;
    const dh = hCov - csCovH;
    const cb = Math.cos(csCovBeta);
    const sb = Math.sin(csCovBeta);
    out.set(
         du * sb - dv * cb,                     // tangent X (right)
         dh,                                    // tangent Y (cover up)
        -(du * cb + dv * sb)                    // tangent Z (back) → forward = -Z
    );
    return out;
}

// ===== Shaders =====
//
// INTRINSIC ground (left panel): a flat tangent-plane patch, fragment shader
// computes (hitU, hitV) per pixel via straight-line exp-map, applies the
// identification (hitV flips on odd wraps), then strips a (u, v) grid and
// a saturated blue→red v-gradient.
//
// EXTRINSIC ground (right panel): the embedded Möbius ribbon. Vertex shader
// uses the standard embedding x = (R + v·cos(u/2))cos(u), etc.; fragment
// shader is the same color/grid as the intrinsic side.
//
// EXTRINSIC entity embedding: per-vertex, takes the entity's strip coords
// and the mesh-local offset, maps to the strip via the embedding, offsets
// by h along the surface normal. The (-h)·(-n) cancellation keeps entities
// continuous across wrap boundaries.

// Shared GLSL: the linear blue→red v-gradient. Matches the sphere
// prototype's saturated palette so the two engines feel like the same product.
const V_GRADIENT_GLSL = `
    vec3 stripColor(float v, float halfW) {
        float t = clamp((v + halfW) / (2.0 * halfW), 0.0, 1.0);
        vec3 cPos = vec3(0.92, 0.10, 0.10);   // +v edge: red
        vec3 cNeg = vec3(0.10, 0.18, 0.92);   // -v edge: blue
        return mix(cNeg, cPos, t);
    }
`;

// --- Intrinsic ground shader ---
const INTRINSIC_VERTEX_SHADER = `
    varying vec3 vTangentPos;
    void main() {
        vTangentPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

// arcX = rightward in tangent plane; arcZ = forward (= -vTangentPos.z).
// Bearing convention: forward in (u,v) = (cos β, sin β); right = (sin β, -cos β).
//
//   du =  arcX·sin β + arcZ·cos β
//   dv = -arcX·cos β + arcZ·sin β
//
// Then add to camera's COVER (u, v) (camera lives in cover-aligned frame),
// reduce hitU mod L, flip hitV on odd wraps.
const INTRINSIC_FRAGMENT_SHADER = `
    precision highp float;
    uniform float uCamU;
    uniform float uCamV;
    uniform float uCamBeta;
    uniform float uL;
    uniform float uW;
    varying vec3 vTangentPos;
    ${V_GRADIENT_GLSL}
    void main() {
        float arcX = vTangentPos.x;
        float arcZ = -vTangentPos.z;
        float cb = cos(uCamBeta);
        float sb = sin(uCamBeta);
        float hitU = uCamU + arcX * sb + arcZ * cb;
        float hitV = uCamV - arcX * cb + arcZ * sb;

        // Identification: reduce hitU to [0, L); flip hitV on odd-wrap fragments.
        float wraps = floor(hitU / uL);
        hitU -= wraps * uL;
        if (mod(abs(wraps), 2.0) > 0.5) hitV = -hitV;

        // Outside the strip: drop the fragment with discard (not alpha=0 +
        // transparent). Discard keeps the depth buffer correct so anything
        // behind the strip is properly occluded; otherwise an n=1 preimage
        // could bleed through the strip's surface.
        if (abs(hitV) > uW) discard;

        // Grid: 20 lines per lap in u, 10 lines across in v.
        float gridU = smoothstep(0.94, 0.96, abs(cos(hitU * 6.283185 * 10.0 / uL)));
        float gridV = smoothstep(0.94, 0.96, abs(cos(hitV * 6.283185 *  5.0 / uW)));
        float grid = max(gridU, gridV);

        vec3 base = stripColor(hitV, uW);
        vec3 color = mix(base, vec3(0.05), grid);

        // Bright highlight at v = ±W to make the boundary unmistakable.
        float edgeBand = smoothstep(0.95, 1.0, abs(hitV) / uW);
        color = mix(color, vec3(0.95, 0.95, 0.95), edgeBand * 0.7);

        gl_FragColor = vec4(color, 1.0);
    }
`;

// --- Extrinsic ground (the embedded ribbon) ---
//
// Vertex shader: embed (u, v) into ℝ³ via the Möbius parametric. Vertex
// positions in the geometry are stored as (u_arc, 0, v) — standard layout
// of buildExtrinsicMobius — and we derive the angle from u_arc / L.
const EXTRINSIC_RIBBON_VERTEX_SHADER = `
    uniform float uR;
    uniform float uL;
    varying float vU;
    varying float vV;
    varying vec3  vWorldPos;
    void main() {
        float uArc = position.x;
        float v    = position.z;
        float angle = uArc * 6.283185307 / uL;
        float halfA = angle * 0.5;
        float cosU = cos(angle);
        float sinU = sin(angle);
        float cosH = cos(halfA);
        float sinH = sin(halfA);
        float rEff = uR + v * cosH;
        vec3 wp = vec3(rEff * cosU, v * sinH, rEff * sinU);
        vU = uArc;
        vV = v;
        vWorldPos = wp;
        gl_Position = projectionMatrix * viewMatrix * vec4(wp, 1.0);
    }
`;

// Fragment shader: same color / grid as the intrinsic side, in (u, v).
const EXTRINSIC_RIBBON_FRAGMENT_SHADER = `
    precision highp float;
    uniform float uL;
    uniform float uW;
    varying float vU;
    varying float vV;
    ${V_GRADIENT_GLSL}
    void main() {
        float gridU = smoothstep(0.94, 0.96, abs(cos(vU * 6.283185 * 10.0 / uL)));
        float gridV = smoothstep(0.94, 0.96, abs(cos(vV * 6.283185 *  5.0 / uW)));
        float grid = max(gridU, gridV);
        vec3 base = stripColor(vV, uW);
        vec3 color = mix(base, vec3(0.05), grid);
        float edgeBand = smoothstep(0.95, 1.0, abs(vV) / uW);
        color = mix(color, vec3(0.95, 0.95, 0.95), edgeBand * 0.7);
        gl_FragColor = vec4(color, 1.0);
    }
`;

// --- Extrinsic entity embedding ---
//
// Per-vertex: take the entity's strip (u, v, β, h), add the mesh-local
// (xLocal, yLocal, zLocal) offset rotated by β, embed (hitU, hitV, hitH)
// through the Möbius parametric, offset by h along the surface normal.
//
// NOTE: the mesh's `position` attribute already encodes (xLocal, yLocal, zLocal)
// in the entity's local frame; the entity's preimage placement is handled
// JS-side via mesh.position / quaternion / scale (-1, -1, 1 for odd preimages
// in the intrinsic view). For the extrinsic view we render exactly ONE copy
// per entity, at its canonical strip coords.
const EXTRINSIC_EMBED_VERTEX_SHADER = `
    uniform float uObjU;
    uniform float uObjV;
    uniform float uObjBeta;
    uniform float uObjH;
    uniform float uR;
    uniform float uL;
    void main() {
        // Local mesh offset in the entity's frame: +X = right, +Y = up
        // (along surface normal), +Z = back (Three.js convention).
        // modelMatrix carries the child mesh's translate/rotate within the
        // entity Group (e.g., a tree canopy translated +80 above the trunk).
        // The entity Group itself is at world origin — placement on the
        // ribbon is done by the embedding below from the uniforms.
        vec4 lp = modelMatrix * vec4(position, 1.0);
        float xLocal = lp.x;
        float yLocal = lp.y;
        float zLocal = lp.z;

        // Forward in cover = (cos β, sin β); back = -forward; right = (sin β, -cos β).
        // Mesh-local -Z is "front" (Three.js convention), so zLocal contributes
        // along -forward (i.e., back direction). Earlier had cos terms flipped,
        // which made entities walk butthole-first in the extrinsic view.
        float cb = cos(uObjBeta);
        float sb = sin(uObjBeta);
        float hitU = uObjU + xLocal * sb - zLocal * cb;
        float hitV = uObjV - xLocal * cb - zLocal * sb;
        float hitH = uObjH + yLocal;

        float angle = hitU * 6.283185307 / uL;
        float halfA = angle * 0.5;
        float cosU = cos(angle);
        float sinU = sin(angle);
        float cosH = cos(halfA);
        float sinH = sin(halfA);
        float rEff = uR + hitV * cosH;
        vec3 surfacePos = vec3(rEff * cosU, hitV * sinH, rEff * sinU);

        // Surface tangents and normal at (hitU, hitV).
        // ∂r/∂uArc = (1/L)·∂r/∂angle · 2π — but we only need DIRECTION; cross
        // product magnitude is normalized. So use ∂r/∂angle, ∂r/∂v directly.
        vec3 ddu = vec3(
            -rEff * sinU - 0.5 * hitV * sinH * cosU,
             0.5 * hitV * cosH,
             rEff * cosU - 0.5 * hitV * sinH * sinU
        );
        vec3 ddv = vec3(cosH * cosU, sinH, cosH * sinU);
        vec3 normal = normalize(cross(ddu, ddv));

        vec3 worldPos = surfacePos + hitH * normal;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
    }
`;

const EXTRINSIC_EMBED_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3  uColor;
    uniform vec3  uTintColor;
    uniform float uTintAmount;     // 0 = no tint (Mode B), 0..1 in Mode A
    // Manual sRGB conversion so colors match the intrinsic side (which uses
    // a stock MeshBasicMaterial with vertex colors that auto-converts).
    vec3 linearToSRGB(vec3 c) {
        bvec3 cutoff = lessThan(c, vec3(0.0031308));
        vec3 hi = pow(c, vec3(1.0 / 2.4)) * 1.055 - 0.055;
        vec3 lo = c * 12.92;
        return mix(hi, lo, vec3(cutoff));
    }
    void main() {
        vec3 c = mix(uColor, uTintColor, clamp(uTintAmount, 0.0, 1.0));
        gl_FragColor = vec4(linearToSRGB(c), 1.0);
    }
`;

// Per-entity uniforms (one per entity, shared by all of its child materials).
// uTintAmount + uTintColor encode height-as-color in Mode A — entities sit
// directly on the strip surface (uObjH=0) and h is communicated visually
// via a teal→amber→red ramp instead of a normal-direction offset, since
// Mode A's identification doesn't flip h and the embedding's surface
// normal does, so any h·normal offset would snap at the wrap boundary.
function createEntityUniforms() {
    return {
        uObjU:       { value: 0 },
        uObjV:       { value: 0 },
        uObjBeta:    { value: 0 },
        uObjH:       { value: 0 },
        uTintAmount: { value: 0 },
        uTintColor:  { value: new THREE.Color(0xffffff) }
    };
}

// Global uniforms shared by every embedding material AND the ground/ribbon.
const GLOBAL_R_UNIFORM = { value: R };
const GLOBAL_L_UNIFORM = { value: L };
const GLOBAL_W_UNIFORM = { value: W };

// All embedding-related materials use DoubleSide. The Möbius surface has no
// globally consistent front/back, and odd preimages mirror the mesh
// (scale.set(-1,-1,1)) — both situations require DoubleSide rendering.
function embeddingMaterial(color, entityUniforms) {
    return new THREE.ShaderMaterial({
        vertexShader:   EXTRINSIC_EMBED_VERTEX_SHADER,
        fragmentShader: EXTRINSIC_EMBED_FRAGMENT_SHADER,
        side: THREE.DoubleSide,
        uniforms: {
            uObjU:       entityUniforms.uObjU,
            uObjV:       entityUniforms.uObjV,
            uObjBeta:    entityUniforms.uObjBeta,
            uObjH:       entityUniforms.uObjH,
            uR:          GLOBAL_R_UNIFORM,
            uL:          GLOBAL_L_UNIFORM,
            uColor:      { value: new THREE.Color(color) },
            uTintAmount: entityUniforms.uTintAmount,
            uTintColor:  entityUniforms.uTintColor
        }
    });
}

// Vertex-color material for INTRINSIC mesh draws. DoubleSide because odd
// preimages flip the mesh via scale.set(-1, -1, 1) which reverses winding.
const VC_MATERIAL = new THREE.MeshBasicMaterial({
    vertexColors: true,
    side: THREE.DoubleSide
});

function basicMaterial(color) {
    return new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
}

function mergeWithColors(parts) {
    const geos = parts.map(p => {
        const g = p.geo.clone();
        if (p.scale)     g.scale(p.scale.x, p.scale.y, p.scale.z);
        if (p.rotationX) g.rotateX(p.rotationX);
        if (p.rotationY) g.rotateY(p.rotationY);
        if (p.rotationZ) g.rotateZ(p.rotationZ);
        if (p.position)  g.translate(p.position.x, p.position.y, p.position.z);
        const n = g.attributes.position.count;
        const colors = new Float32Array(n * 3);
        const c = new THREE.Color(p.color);
        for (let i = 0; i < n; i++) {
            colors[i * 3]     = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
        }
        g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        return g;
    });
    return mergeGeometries(geos, false);
}

function ribbonMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader:   EXTRINSIC_RIBBON_VERTEX_SHADER,
        fragmentShader: EXTRINSIC_RIBBON_FRAGMENT_SHADER,
        side: THREE.DoubleSide,
        uniforms: {
            uR: GLOBAL_R_UNIFORM,
            uL: GLOBAL_L_UNIFORM,
            uW: GLOBAL_W_UNIFORM
        }
    });
}

function intrinsicGroundMaterial() {
    return new THREE.ShaderMaterial({
        vertexShader:   INTRINSIC_VERTEX_SHADER,
        fragmentShader: INTRINSIC_FRAGMENT_SHADER,
        side: THREE.DoubleSide,
        // Opaque — fragments outside the strip use `discard`, which leaves
        // the depth buffer alone. `transparent: true` would put this in the
        // transparent render queue and break occlusion of below-strip geometry.
        transparent: false,
        uniforms: {
            uCamU:    { value: 0 },
            uCamV:    { value: 0 },
            uCamBeta: { value: 0 },
            uL:       GLOBAL_L_UNIFORM,
            uW:       GLOBAL_W_UNIFORM
        }
    });
}

// ===== Extrinsic ribbon mesh =====
//
// Geometry is laid out with vertex `position = (uArc, 0, v)`. The vertex
// shader reads these and embeds. Storing (uArc, _, v) in the buffer means
// updating R, W, or L only requires nudging the uniforms — the geometry
// itself doesn't depend on the slider values, so no rebuilds.
//
// Resolution: 240 segments around (one every 1.5° of angle), 12 across.
function buildRibbonGeometry() {
    // Mesh covers u in [0, L]. The Möbius parametric has period 4π in u_ang
    // (= 2L in u-arc), but the [0, L] mesh covers each 3D point on the
    // ribbon exactly ONCE. Going to [0, 2L] would double-cover, with two
    // copies giving conflicting v-gradient colors at the same 3D point
    // (z-fighting → visible color bleed).
    //
    // For entities whose cover-u may exceed L (player, walkers), we deck-
    // transform their extrinsic uniforms back into [0, L) — see updateEntities.
    const segU = 240;
    const segV = 12;
    const positions = [];
    const indices = [];
    for (let j = 0; j <= segV; j++) {
        const v = -W_INITIAL + (2 * W_INITIAL) * (j / segV);
        for (let i = 0; i <= segU; i++) {
            const uArc = (2 * Math.PI * R_INITIAL) * (i / segU);  // [0, L_INITIAL]
            positions.push(uArc, 0, v);
        }
    }
    for (let j = 0; j < segV; j++) {
        for (let i = 0; i < segU; i++) {
            const a = j * (segU + 1) + i;
            const b = a + 1;
            const c = a + (segU + 1);
            const d = c + 1;
            indices.push(a, b, c, b, d, c);
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeBoundingSphere();
    geo._segU = segU;
    geo._segV = segV;
    return geo;
}

// Re-write the ribbon's vertex positions when R or W changes. The shader
// derives `angle = uArc · 2π / L`, so changing L (= 2πR) automatically
// re-embeds without rewriting positions — but positions still encode the
// raw uArc range and the v range, both of which depend on R and W.
function updateRibbonGeometry(geo) {
    const segU = geo._segU;
    const segV = geo._segV;
    const arr = geo.attributes.position.array;
    let k = 0;
    for (let j = 0; j <= segV; j++) {
        const v = -W + (2 * W) * (j / segV);
        for (let i = 0; i <= segU; i++) {
            const uArc = L * (i / segU);
            arr[k++] = uArc;
            arr[k++] = 0;
            arr[k++] = v;
        }
    }
    geo.attributes.position.needsUpdate = true;
    geo.computeBoundingSphere();
}

// ===== Edge bands =====
//
// Two thin tubes at v = ±W, rendered through the same embedding shader so
// they sit exactly on the strip's edges in the extrinsic view. Solid red
// at +W, solid blue at -W.
const EDGE_BAND_HALF_THICKNESS = 1.5;  // ±1.5m thick (in h direction); enough to read as a colored band, not a hairline
function buildEdgeBandGeometry(sign) {
    // Same single-cover [0, L] range as the ribbon mesh. The Möbius strip
    // has only ONE physical edge curve (length 2L); on the [0, L] mesh, our
    // +W band traces half of it and -W band traces the other half. Both
    // bands together cover the full physical edge exactly once.
    const segU = 240;
    const positions = [];
    const indices = [];
    for (let j = -1; j <= 1; j += 2) {
        const yOff = j * EDGE_BAND_HALF_THICKNESS;
        for (let i = 0; i <= segU; i++) {
            const uArc = L * (i / segU);
            positions.push(uArc, yOff, sign * W);
        }
    }
    for (let i = 0; i < segU; i++) {
        const a = i;
        const b = a + 1;
        const c = a + (segU + 1);
        const d = c + 1;
        indices.push(a, b, c, b, d, c);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeBoundingSphere();
    geo._segU = segU;
    geo._sign = sign;
    return geo;
}
function updateEdgeBandGeometry(geo) {
    const segU = geo._segU;
    const sign = geo._sign;
    const arr = geo.attributes.position.array;
    let k = 0;
    for (let j = -1; j <= 1; j += 2) {
        const yOff = j * EDGE_BAND_HALF_THICKNESS;
        for (let i = 0; i <= segU; i++) {
            const uArc = L * (i / segU);
            arr[k++] = uArc;
            arr[k++] = yOff;
            arr[k++] = sign * W;
        }
    }
    geo.attributes.position.needsUpdate = true;
    geo.computeBoundingSphere();
}
// Dedicated shader for the edge bands. Their geometry positions are
// (uArc, yOff, vCoord) — already canonical strip-coords — so the entity
// embedding shader (which expects mesh-local x/y/z and adds them through a
// bearing transform with uObjU/uObjV uniforms) is the wrong path. Using
// it sent the bands to (hitU = -sign·W, hitV = -uArc, hitH = yOff): a
// pixel-thin streak far off the actual ribbon edge.
const EDGE_BAND_VERTEX_SHADER = `
    uniform float uR;
    uniform float uL;
    void main() {
        float uArc   = position.x;
        float yOff   = position.y;
        float vCoord = position.z;
        float angle = uArc * 6.283185307 / uL;
        float halfA = angle * 0.5;
        float cosU = cos(angle), sinU = sin(angle);
        float cosH = cos(halfA), sinH = sin(halfA);
        float rEff = uR + vCoord * cosH;
        vec3 surfacePos = vec3(rEff * cosU, vCoord * sinH, rEff * sinU);
        vec3 ddu = vec3(
            -rEff * sinU - 0.5 * vCoord * sinH * cosU,
             0.5 * vCoord * cosH,
             rEff * cosU - 0.5 * vCoord * sinH * sinU
        );
        vec3 ddv = vec3(cosH * cosU, sinH, cosH * sinU);
        vec3 normal = normalize(cross(ddu, ddv));
        vec3 worldPos = surfacePos + yOff * normal;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
    }
`;
const EDGE_BAND_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3 uColor;
    vec3 linearToSRGB(vec3 c) {
        bvec3 cutoff = lessThan(c, vec3(0.0031308));
        vec3 hi = pow(c, vec3(1.0 / 2.4)) * 1.055 - 0.055;
        vec3 lo = c * 12.92;
        return mix(hi, lo, vec3(cutoff));
    }
    void main() {
        gl_FragColor = vec4(linearToSRGB(uColor), 1.0);
    }
`;
function edgeBandMaterial(color) {
    return new THREE.ShaderMaterial({
        vertexShader:   EDGE_BAND_VERTEX_SHADER,
        fragmentShader: EDGE_BAND_FRAGMENT_SHADER,
        side: THREE.DoubleSide,
        uniforms: {
            uR:     GLOBAL_R_UNIFORM,
            uL:     GLOBAL_L_UNIFORM,
            uColor: { value: new THREE.Color(color) }
        }
    });
}

function makeEdgeBand(sign) {
    const geo = buildEdgeBandGeometry(sign);
    const color = (sign > 0) ? 0xea1818 : 0x1830ea;
    return new THREE.Mesh(geo, edgeBandMaterial(color));
}

// ===== Ground patch (intrinsic view) =====
//
// A static flat plane in the camera's tangent space. The fragment shader
// drives all the manifold-aware coloring; the geometry is just a coarse
// quad grid for linear interpolation of vTangentPos.
function buildGroundPatch() {
    const N = GRID_N;
    const positions = new Float32Array(N * N * 3);
    const indices = new Uint32Array((N - 1) * (N - 1) * 6);
    let idx = 0;
    for (let j = 0; j < N; j++) {
        const arcZ = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (j / (N - 1));
        for (let i = 0; i < N; i++) {
            const arcX = -GRID_HALF_ARC + (2 * GRID_HALF_ARC) * (i / (N - 1));
            positions[idx++] = arcX;
            positions[idx++] = 0;
            positions[idx++] = -arcZ;
        }
    }
    let k = 0;
    for (let j = 0; j < N - 1; j++) {
        for (let i = 0; i < N - 1; i++) {
            const a = j * N + i;
            const b = a + 1;
            const c = a + N;
            const d = c + 1;
            indices[k++] = a; indices[k++] = b; indices[k++] = c;
            indices[k++] = b; indices[k++] = d; indices[k++] = c;
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeBoundingSphere();

    const material = intrinsicGroundMaterial();
    const mesh = new THREE.Mesh(geo, material);
    return { mesh, material };
}

// ===== Player mesh =====
//
// Pink cube with white eyes, dark pupils, dark-pink belt at h*0.6, and a
// bold white "R" decal on the +X side of the belt — the asymmetry that
// makes the v-flip visible after one lap. L-shaped arms for facing reference.
function playerParts() {
    const eyeY = PLAYER_H * 0.75;
    const eyeZ = -PLAYER_W / 2 - 0.1;
    const parts = [
        // Body
        { geo: new THREE.BoxGeometry(PLAYER_W, PLAYER_H, PLAYER_W),
          color: PLAYER_COLOR,
          position: { x: 0, y: PLAYER_H / 2, z: 0 } },
        // Belt
        { geo: new THREE.BoxGeometry(PLAYER_W + 0.2, 1.5, PLAYER_W + 0.2),
          color: PLAYER_BELT_COLOR,
          position: { x: 0, y: PLAYER_H * 0.6, z: 0 } }
    ];
    // Eyes + pupils
    const eyeGeo   = new THREE.BoxGeometry(4, 5, 0.4);
    const pupilGeo = new THREE.BoxGeometry(2, 3, 0.2);
    for (const sx of [-1, 1]) {
        parts.push({ geo: eyeGeo,   color: 0xffffff,
                     position: { x: sx * PLAYER_W * 0.2, y: eyeY, z: eyeZ } });
        parts.push({ geo: pupilGeo, color: 0x000000,
                     position: { x: sx * PLAYER_W * 0.2, y: eyeY, z: eyeZ - 0.3 } });
    }
    // "R" decal on the +X belt face. Built from three thin boxes:
    //   1) vertical stem  on the LEFT side of the letter
    //   2) bowl: top horizontal + right vertical (a small filled square area)
    //   3) leg: diagonal not feasible with boxes — use a slanted thin box rotated
    // Keep it simple: vertical stem + top horizontal + middle horizontal +
    // right vertical (top half) + diagonal leg (one rotated box).
    const decalX = PLAYER_W / 2 + 0.05;
    const decalCY = PLAYER_H * 0.6;            // belt center
    const decalSize = 4.0;                     // letter height
    const t = 0.7;                             // stroke thickness
    const half = decalSize * 0.5;
    // Stem (left vertical)
    parts.push({ geo: new THREE.BoxGeometry(0.2, decalSize, t),
                 color: 0xffffff,
                 position: { x: decalX, y: decalCY, z: -half * 0.6 } });
    // Top horizontal
    parts.push({ geo: new THREE.BoxGeometry(0.2, t, decalSize * 0.7),
                 color: 0xffffff,
                 position: { x: decalX, y: decalCY + half - t/2, z: -half * 0.25 } });
    // Right vertical (top half — closes the bowl)
    parts.push({ geo: new THREE.BoxGeometry(0.2, decalSize * 0.5, t),
                 color: 0xffffff,
                 position: { x: decalX, y: decalCY + decalSize * 0.25 - t/2, z: half * 0.1 } });
    // Mid horizontal (where the bowl meets the leg)
    parts.push({ geo: new THREE.BoxGeometry(0.2, t, decalSize * 0.7),
                 color: 0xffffff,
                 position: { x: decalX, y: decalCY, z: -half * 0.25 } });
    // Leg (diagonal): a thin box rotated about X
    parts.push({ geo: new THREE.BoxGeometry(0.2, decalSize * 0.55, t),
                 color: 0xffffff,
                 position: { x: decalX, y: decalCY - decalSize * 0.25, z: half * 0.1 },
                 rotationX: -0.55 });
    // Front mark — small dark dot under the eyes (kept from the sphere version
    // for facing-direction reading from the front).
    parts.push({ geo: new THREE.BoxGeometry(1, 1, 0.2),
                 color: 0x000000,
                 position: { x: 0, y: PLAYER_H * 0.35, z: PLAYER_W / 2 + 0.1 } });
    // L-shaped arms
    const upperArmGeo = new THREE.BoxGeometry(2, 6, 2);
    const forearmGeo  = new THREE.BoxGeometry(2, 2, 5);
    const armX = PLAYER_W / 2 + 1;
    for (const sx of [-1, 1]) {
        parts.push({ geo: upperArmGeo, color: PLAYER_BELT_COLOR,
                     position: { x: sx * armX, y: PLAYER_H * 0.6, z: 0 } });
        parts.push({ geo: forearmGeo,  color: PLAYER_BELT_COLOR,
                     position: { x: sx * armX, y: PLAYER_H * 0.45, z: -3 } });
    }
    return parts;
}

function makePlayerMeshExtrinsic(materialFor) {
    const g = new THREE.Group();
    for (const p of playerParts()) {
        const m = new THREE.Mesh(p.geo, materialFor(p.color));
        m.position.set(p.position.x, p.position.y, p.position.z);
        if (p.rotationX) m.rotation.x = p.rotationX;
        if (p.rotationY) m.rotation.y = p.rotationY;
        if (p.rotationZ) m.rotation.z = p.rotationZ;
        g.add(m);
    }
    return g;
}
function makePlayerMeshIntrinsic() {
    return new THREE.Mesh(mergeWithColors(playerParts()), VC_MATERIAL);
}

// ===== Entity factories =====
//
// Each factory returns
//   { kind, intrinsicMesh, extrinsicMesh, entityUniforms,
//     u, v, beta, h, ... }
// The mesh is built so that local +Y is "up" (along surface normal in cover
// terms) and the group's origin sits at the entity's base height.
//
// Walkers are dynamic in u; their u is updated each frame.
const COLOR_WALKER_RED   = 0xe84c4c;
const COLOR_WALKER_BLUE  = 0x4c8ae8;
const COLOR_TRUNK        = 0x7a4a22;
const COLOR_CANOPY       = 0x2f8a3f;
const COLOR_CANOPY_LIGHT = 0x3fa64f;
const COLOR_SMILEY       = 0xffd84a;
const COLOR_SMILEY_DARK  = 0x222222;
const COLOR_PLATFORM_BASE = 0x7a4a22;
const COLOR_PLATFORM_TOP  = 0x3a8c3a;
const COLOR_SIGNPOST_BOARD = 0xf5e9d4;
const COLOR_SIGNPOST_TEXT  = 0x1a1a1a;
const POLE_COLORS = [
    0xe84c4c, 0xf0f0f0, 0x4c8ae8, 0xf0f0f0, 0xe8c84c,
    0xf0f0f0, 0x4ce884, 0xf0f0f0, 0xc084ff, 0xf0f0f0
];

function makeWalker(color, u, v, walkSpeed) {
    const Wm = 20;
    const Hm = 24;
    const geo = new THREE.BoxGeometry(Wm, Hm, Wm);
    const make = (mat) => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(geo, mat);
        body.position.y = Hm / 2;
        g.add(body);
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'walker',
        intrinsicMesh: make(basicMaterial(color)),
        extrinsicMesh: make(embeddingMaterial(color, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h: 0,
        speed: walkSpeed,                       // m/s along +u
        size: Wm, height: Hm
    };
}

function makeTree(u, v) {
    const TRUNK_W = 14, TRUNK_H = 40;
    const parts = [
        { geo: new THREE.BoxGeometry(TRUNK_W, TRUNK_H, TRUNK_W),
          color: COLOR_TRUNK, position: { x: 0, y: TRUNK_H / 2, z: 0 } },
        { geo: new THREE.SphereGeometry(28, 24, 16),
          color: COLOR_CANOPY, position: { x: 0, y: 80, z: 0 } },
        { geo: new THREE.SphereGeometry(18, 18, 14),
          color: COLOR_CANOPY_LIGHT, position: { x: -10, y: 88, z: 0 } },
        { geo: new THREE.SphereGeometry(16, 18, 14),
          color: COLOR_CANOPY_LIGHT, position: { x: 12, y: 84, z: 0 } }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'tree',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h: 0
    };
}

function makeSmiley(u, v, h, radius) {
    const RR = radius || 25;
    const z = -RR * 0.92;
    const eyeGeo = new THREE.SphereGeometry(RR * 0.13, 12, 8);
    const parts = [
        { geo: new THREE.SphereGeometry(RR, 32, 24),
          color: COLOR_SMILEY, position: { x: 0, y: 0, z: 0 } },
        { geo: eyeGeo, color: COLOR_SMILEY_DARK,
          position: { x: -RR * 0.32, y: RR * 0.20, z } },
        { geo: eyeGeo, color: COLOR_SMILEY_DARK,
          position: { x:  RR * 0.32, y: RR * 0.20, z } },
        { geo: new THREE.TorusGeometry(RR * 0.45, RR * 0.06, 8, 24, Math.PI),
          color: COLOR_SMILEY_DARK,
          position: { x: 0, y: -RR * 0.10, z: z * 0.97 },
          rotationZ: Math.PI }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            if (p.rotationZ) m.rotation.z = p.rotationZ;
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'smiley',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h
    };
}

function makeStripedPole(u, v) {
    const POLE_W = 12;
    const TOTAL_H = 300;
    const N_BANDS = POLE_COLORS.length;
    const BAND_H = TOTAL_H / N_BANDS;
    const bandGeo = new THREE.BoxGeometry(POLE_W, BAND_H, POLE_W);
    const parts = [];
    for (let i = 0; i < N_BANDS; i++) {
        parts.push({
            geo: bandGeo,
            color: POLE_COLORS[i],
            position: { x: 0, y: i * BAND_H + BAND_H / 2, z: 0 }
        });
    }
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'pole',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h: 0
    };
}

function makePlatform(u, v, h, width, depth, height) {
    const baseH = height * 0.82;
    const topH  = height - baseH;
    const parts = [
        { geo: new THREE.BoxGeometry(width, baseH, depth),
          color: COLOR_PLATFORM_BASE,
          position: { x: 0, y: baseH / 2, z: 0 } },
        { geo: new THREE.BoxGeometry(width, topH, depth),
          color: COLOR_PLATFORM_TOP,
          position: { x: 0, y: baseH + topH / 2, z: 0 } }
    ];
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'platform',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h, height,
        _platformW: width,
        _platformH: height,
        _platformD: depth,
        footprintRadius: Math.max(width, depth) * 0.5
    };
}

// ===== Signpost =====
//
// A flat board mounted on a thin post. The +X face of the board carries the
// word "FORWARD" baked into the mesh as raised letter strokes. The -X face
// is blank. Walking past it on an odd preimage shows the text mirrored.
function makeSignpost(u, v, text) {
    text = text || 'FORWARD';
    const POST_W = 4;
    const POST_H = 32;
    const BOARD_W = 60;     // along entity's local Z (sign extends backward
                            // from anchor — flat against the post)
    const BOARD_H = 16;
    const BOARD_T = 1.2;    // thickness in X
    const boardCY = POST_H + BOARD_H / 2;
    const parts = [
        { geo: new THREE.BoxGeometry(POST_W, POST_H, POST_W),
          color: COLOR_TRUNK,
          position: { x: 0, y: POST_H / 2, z: 0 } },
        { geo: new THREE.BoxGeometry(BOARD_T, BOARD_H, BOARD_W),
          color: COLOR_SIGNPOST_BOARD,
          position: { x: 0, y: boardCY, z: -BOARD_W * 0.4 } }
    ];
    // Letter strokes on the +X face. Each letter is a 5×7 stick-figure on a
    // grid; we draw it as a few thin boxes. Hand-coded for "FORWARD"
    // (7 letters), arranged left-to-right along -Z.
    const letterH = BOARD_H * 0.62;
    const letterW = letterH * 0.62;
    const stroke  = letterH * 0.12;
    const xFace = BOARD_T / 2 + 0.1;
    const totalLettersW = text.length * letterW + (text.length - 1) * letterW * 0.35;
    const startZ = -BOARD_W * 0.4 + totalLettersW / 2;     // text mid-Z relative to sign center
    const letterGap = letterW * 1.35;
    function strokeBox(cy, cz, w, h, t) {
        return new THREE.BoxGeometry(t, h, w);
    }
    const stickFigure = {
        F: ['LV','TH','MH'],
        O: ['LV','RV','TH','BH'],
        R: ['LV','TH','MH','TR','DL'],
        W: ['LV','RV','BH','MV'],     // simplified W
        A: ['LV','RV','TH','MH'],
        D: ['LV','TH','BH','RV']
    };
    const lettersUsed = text.toUpperCase().split('');
    for (let i = 0; i < lettersUsed.length; i++) {
        const ch = lettersUsed[i];
        const cz = startZ - i * letterGap - letterW / 2;
        const cy = boardCY;
        const half = letterW / 2;
        const halfH = letterH / 2;
        const mid   = 0;
        const top   =  halfH - stroke / 2;
        const bot   = -halfH + stroke / 2;
        const lft   = -half  + stroke / 2;
        const rgt   =  half  - stroke / 2;
        const ops = stickFigure[ch] || ['LV','RV','TH','BH'];
        for (const op of ops) {
            if (op === 'LV') parts.push({ geo: strokeBox(cy, cz, stroke, letterH, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy, z: cz + lft } });
            else if (op === 'RV') parts.push({ geo: strokeBox(cy, cz, stroke, letterH, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy, z: cz + rgt } });
            else if (op === 'TH') parts.push({ geo: strokeBox(cy, cz, letterW, stroke, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy + top, z: cz } });
            else if (op === 'MH') parts.push({ geo: strokeBox(cy, cz, letterW, stroke, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy + mid, z: cz } });
            else if (op === 'BH') parts.push({ geo: strokeBox(cy, cz, letterW, stroke, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy + bot, z: cz } });
            else if (op === 'MV') parts.push({ geo: strokeBox(cy, cz, stroke, letterH * 0.5, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy - letterH * 0.25, z: cz } });
            else if (op === 'TR') parts.push({ geo: strokeBox(cy, cz, letterW, stroke, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy + top - stroke, z: cz + half * 0.4 } });
            else if (op === 'DL') parts.push({ geo: strokeBox(cy, cz, stroke, letterH * 0.55, stroke),
                color: COLOR_SIGNPOST_TEXT,
                position: { x: xFace, y: cy - letterH * 0.22, z: cz + half * 0.45 } });
        }
    }
    const makeExtrinsic = (matFor) => {
        const g = new THREE.Group();
        for (const p of parts) {
            const m = new THREE.Mesh(p.geo, matFor(p.color));
            m.position.set(p.position.x, p.position.y, p.position.z);
            g.add(m);
        }
        return g;
    };
    const entityUniforms = createEntityUniforms();
    return {
        kind: 'signpost',
        label: 'Signpost',
        intrinsicMesh: new THREE.Mesh(mergeWithColors(parts), VC_MATERIAL),
        extrinsicMesh: makeExtrinsic((c) => embeddingMaterial(c, entityUniforms)),
        entityUniforms,
        u, v, beta: 0, h: 0
    };
}

// ===== Extrinsic view =====
function makeExtrinsicView(canvas) {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a10);

    const ribbonGeo = buildRibbonGeometry();
    const ribbonMesh = new THREE.Mesh(ribbonGeo, ribbonMaterial());
    scene.add(ribbonMesh);

    // Edge bands.
    const edgeBandPos = makeEdgeBand(+1);
    const edgeBandNeg = makeEdgeBand(-1);
    scene.add(edgeBandPos);
    scene.add(edgeBandNeg);

    const camera = new THREE.PerspectiveCamera(45, 1, 1, R * 60);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const orbit = {
        azimuth: -1.4100,
        elevation: 0.5534,
        radius: 721.84,
        target: new THREE.Vector3(84.314, -26.578, -6.552),
        mode: null,
        lastX: 0, lastY: 0
    };
    const _camRight = new THREE.Vector3();
    const _camUp = new THREE.Vector3();
    const _camForward = new THREE.Vector3();

    // Selection: yellow wireframe per kind, plus cyan for the smiley.
    const FOCUS_OFFSET = {
        player: PLAYER_H * 0.5, walker: 12, tree: 60, smiley: 0,
        pole: 150, platform: 11, signpost: 32 + 8
    };
    const WIRE_COLOR = { smiley: 0x4be1ff };
    const WIRE_DEFAULT = 0xffe14a;
    const raycaster = new THREE.Raycaster();
    const _ndc = new THREE.Vector2();
    const _entityCenter = new THREE.Vector3();
    let selection = null;

    const SELECTION_MAT = new THREE.MeshBasicMaterial({
        color: WIRE_DEFAULT, wireframe: true, transparent: true, opacity: 0.55
    });
    const _placeholderGeo = new THREE.SphereGeometry(1, 8, 6);
    const selectionMesh = new THREE.Mesh(_placeholderGeo, SELECTION_MAT);
    selectionMesh.visible = false;
    scene.add(selectionMesh);

    function ensureWireGeo(e) {
        if (e._wireGeo) return e._wireGeo;
        const PAD = 4;
        let g;
        switch (e.kind) {
            case 'player':
                g = new THREE.BoxGeometry(PLAYER_W + PAD, PLAYER_H + PAD, PLAYER_W + PAD);
                g.translate(0, PLAYER_H * 0.5, 0); break;
            case 'walker':
                g = new THREE.BoxGeometry(20 + PAD, 24 + PAD, 20 + PAD);
                g.translate(0, 12, 0); break;
            case 'tree':
                g = new THREE.CylinderGeometry(36, 16, 112, 14);
                g.translate(0, 56, 0); break;
            case 'smiley':
                g = new THREE.SphereGeometry(85, 18, 12); break;
            case 'pole':
                g = new THREE.CylinderGeometry(10, 10, 305, 10);
                g.translate(0, 150, 0); break;
            case 'platform':
                g = new THREE.BoxGeometry(
                    (e._platformW || 50) + PAD,
                    (e._platformH || 22) + PAD,
                    (e._platformD || 50) + PAD
                );
                g.translate(0, (e._platformH || 22) * 0.5, 0); break;
            case 'signpost':
                g = new THREE.BoxGeometry(8, 50, 64);
                g.translate(0, 25, -22); break;
            default:
                g = new THREE.SphereGeometry(25, 16, 12);
        }
        e._wireGeo = g;
        return g;
    }

    // Embed (u, v, h) → world position (used for selection box placement).
    const _embTmp = new THREE.Vector3();
    function embedSurface(u, v, h, out) {
        const angle = u * 2 * Math.PI / L;
        const halfA = angle * 0.5;
        const cosU = Math.cos(angle);
        const sinU = Math.sin(angle);
        const cosH = Math.cos(halfA);
        const sinH = Math.sin(halfA);
        const rEff = R + v * cosH;
        const sx = rEff * cosU;
        const sy = v * sinH;
        const sz = rEff * sinU;
        if (h !== 0) {
            // Surface normal — same formulas as the vertex shader.
            const ddux = -rEff * sinU - 0.5 * v * sinH * cosU;
            const dduy = 0.5 * v * cosH;
            const dduz =  rEff * cosU - 0.5 * v * sinH * sinU;
            const ddvx = cosH * cosU;
            const ddvy = sinH;
            const ddvz = cosH * sinU;
            const nx = dduy * ddvz - dduz * ddvy;
            const ny = dduz * ddvx - ddux * ddvz;
            const nz = ddux * ddvy - dduy * ddvx;
            const nLen = Math.sqrt(nx*nx + ny*ny + nz*nz);
            out.set(sx + h * nx / nLen, sy + h * ny / nLen, sz + h * nz / nLen);
        } else {
            out.set(sx, sy, sz);
        }
        return out;
    }

    function entityCenter(e, out) {
        // Embed entity at (u, v, h + offset) along the surface normal.
        const h = (e.h || 0) + (FOCUS_OFFSET[e.kind] || 0);
        return embedSurface(e.u, e.v, h, out);
    }

    function raySphereT(ro, rd, cx, cy, cz, r) {
        const ox = ro.x - cx, oy = ro.y - cy, oz = ro.z - cz;
        const b = ox * rd.x + oy * rd.y + oz * rd.z;
        const c = ox*ox + oy*oy + oz*oz - r*r;
        const disc = b*b - c;
        if (disc < 0) return null;
        const t = -b - Math.sqrt(disc);
        return (t < 0) ? null : t;
    }

    function rayEntityT(ro, rd, e) {
        // Approximate hit test: embed entity center at the kind's focus offset
        // and use a sphere fit. Good enough for click-picking on the ribbon.
        entityCenter(e, _entityCenter);
        let r = 30;
        if (e.kind === 'player')   r = 22;
        if (e.kind === 'walker')   r = 18;
        if (e.kind === 'tree')     r = 60;
        if (e.kind === 'smiley')   r = 85;
        if (e.kind === 'pole')     r = 160;
        if (e.kind === 'platform') r = Math.max(e._platformW || 50, e._platformD || 50) * 0.6;
        if (e.kind === 'signpost') r = 40;
        return raySphereT(ro, rd, _entityCenter.x, _entityCenter.y, _entityCenter.z, r);
    }

    function pickAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        _ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        _ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(_ndc, camera);
        const ro = raycaster.ray.origin;
        const rd = raycaster.ray.direction;
        let bestT = Infinity, best = null;
        for (const e of entities) {
            const t = rayEntityT(ro, rd, e);
            if (t !== null && t < bestT) {
                bestT = t;
                entityCenter(e, _entityCenter);
                best = { kind: 'entity', entity: e, focus: _entityCenter.clone() };
            }
        }
        return best;
    }

    function updateSelection() {
        if (!selection) { selectionMesh.visible = false; return; }
        selectionMesh.visible = true;
        const e = selection.entity;
        selectionMesh.geometry = ensureWireGeo(e);
        selectionMesh.material.color.setHex(WIRE_COLOR[e.kind] || WIRE_DEFAULT);
        // Place + orient: position at entity's surface point, +Y aligned with
        // the local surface normal at (u, v).
        const surfacePos = embedSurface(e.u, e.v, 0, _embTmp);
        selectionMesh.position.copy(surfacePos);
        // Normal direction (already normalized in embedSurface for h > 0; redo).
        const angle = e.u * 2 * Math.PI / L;
        const halfA = angle * 0.5;
        const cosU = Math.cos(angle);
        const sinU = Math.sin(angle);
        const cosH = Math.cos(halfA);
        const sinH = Math.sin(halfA);
        const rEff = R + e.v * cosH;
        const ddux = -rEff * sinU - 0.5 * e.v * sinH * cosU;
        const dduy = 0.5 * e.v * cosH;
        const dduz =  rEff * cosU - 0.5 * e.v * sinH * sinU;
        const ddvx = cosH * cosU;
        const ddvy = sinH;
        const ddvz = cosH * sinU;
        const nx = dduy * ddvz - dduz * ddvy;
        const ny = dduz * ddvx - ddux * ddvz;
        const nz = ddux * ddvy - dduy * ddvx;
        const nLen = Math.sqrt(nx*nx + ny*ny + nz*nz);
        const upN = new THREE.Vector3(nx/nLen, ny/nLen, nz/nLen);
        selectionMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), upN);
        selectionMesh.scale.setScalar(1);
    }

    function applyOrbit() {
        const ce = Math.cos(orbit.elevation);
        const se = Math.sin(orbit.elevation);
        const ca = Math.cos(orbit.azimuth);
        const sa = Math.sin(orbit.azimuth);
        camera.position.set(
            orbit.target.x + orbit.radius * ce * sa,
            orbit.target.y + orbit.radius * se,
            orbit.target.z + orbit.radius * ce * ca
        );
        camera.lookAt(orbit.target);
    }
    applyOrbit();

    let pointerDownX = 0, pointerDownY = 0;
    canvas.style.cursor = 'grab';
    canvas.addEventListener('pointerdown', (e) => {
        const alt = e.altKey;
        if      (e.button === 0)               orbit.mode = 'orbit';
        else if (e.button === 1)               orbit.mode = 'pan';
        else if (e.button === 2 &&  alt)       orbit.mode = 'dragZoom';
        else if (e.button === 2 && !alt)       orbit.mode = 'fpsLook';
        else return;
        e.preventDefault();
        pointerDownX = e.clientX;
        pointerDownY = e.clientY;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor =
            orbit.mode === 'pan'      ? 'move' :
            orbit.mode === 'fpsLook'  ? 'crosshair' :
            orbit.mode === 'dragZoom' ? 'ns-resize' :
                                        'grabbing';
    });
    canvas.addEventListener('pointermove', (e) => {
        if (!orbit.mode) return;
        const dx = e.clientX - orbit.lastX;
        const dy = e.clientY - orbit.lastY;
        orbit.lastX = e.clientX;
        orbit.lastY = e.clientY;
        if (orbit.mode === 'orbit') {
            orbit.azimuth -= dx * 0.005;
            orbit.elevation = Math.max(-1.4, Math.min(1.4, orbit.elevation + dy * 0.005));
        } else if (orbit.mode === 'pan') {
            camera.matrixWorld.extractBasis(_camRight, _camUp, _camForward);
            const rate = orbit.radius * 0.0015;
            orbit.target.addScaledVector(_camRight, -dx * rate);
            orbit.target.addScaledVector(_camUp,    dy * rate);
        } else if (orbit.mode === 'fpsLook') {
            const ce0 = Math.cos(orbit.elevation), se0 = Math.sin(orbit.elevation);
            const ca0 = Math.cos(orbit.azimuth),   sa0 = Math.sin(orbit.azimuth);
            const camX = orbit.target.x + orbit.radius * ce0 * sa0;
            const camY = orbit.target.y + orbit.radius * se0;
            const camZ = orbit.target.z + orbit.radius * ce0 * ca0;
            orbit.azimuth -= dx * 0.005;
            orbit.elevation = Math.max(-1.4, Math.min(1.4, orbit.elevation + dy * 0.005));
            const ce1 = Math.cos(orbit.elevation), se1 = Math.sin(orbit.elevation);
            const ca1 = Math.cos(orbit.azimuth),   sa1 = Math.sin(orbit.azimuth);
            orbit.target.set(
                camX - orbit.radius * ce1 * sa1,
                camY - orbit.radius * se1,
                camZ - orbit.radius * ce1 * ca1
            );
        } else if (orbit.mode === 'dragZoom') {
            const factor = Math.exp(dy * 0.005);
            orbit.radius = Math.max(R * 1.1, Math.min(R * 20, orbit.radius * factor));
        }
        applyOrbit();
    });
    function endDrag(e) {
        if (!orbit.mode) return;
        const dx = e.clientX - pointerDownX;
        const dy = e.clientY - pointerDownY;
        const wasClick = (dx * dx + dy * dy) < 25;
        if (wasClick && orbit.mode === 'orbit' && e.button === 0) {
            selection = pickAt(e.clientX, e.clientY);
        }
        orbit.mode = null;
        try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
        canvas.style.cursor = 'grab';
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    canvas.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

    canvas.tabIndex = 0;
    canvas.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') {
            if (selection) {
                if (selection.kind === 'entity') entityCenter(selection.entity, selection.focus);
                orbit.target.copy(selection.focus);
            } else {
                orbit.target.set(0, 0, 0);
            }
            applyOrbit();
            e.preventDefault();
        } else if (e.key === 'Escape') {
            selection = null;
            e.preventDefault();
        }
    });
    canvas.addEventListener('pointerenter', () => { canvas.focus(); });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = Math.exp(e.deltaY * 0.0012);
        orbit.radius = Math.max(R * 1.1, Math.min(R * 20, orbit.radius * factor));
        applyOrbit();
    }, { passive: false });

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function render() {
        updateSelection();
        renderer.render(scene, camera);
    }

    return {
        scene, camera, renderer,
        ribbonGeo, ribbonMesh, edgeBandPos, edgeBandNeg,
        orbit, applyOrbit, resize, render,
        getSelection: () => selection
    };
}

// ===== Intrinsic view =====
function makeIntrinsicView(canvas) {
    const scene = new THREE.Scene();
    const ground = buildGroundPatch();
    scene.add(ground.mesh);

    const camera = new THREE.PerspectiveCamera(70, 1, 0.1, DEFAULT_FAR);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const _lookTarget = new THREE.Vector3();
    const _playerTangentTmp = new THREE.Vector3();

    function placeCamera(world) {
        // Three.js +Y = cover +h (sky). Camera tracks the player vertically
        // so jumps don't drag the world down: camera.y = player.h + body
        // half-height + orbit-pitch offset. cameraSurface.h is 0 (foot on
        // strip), so projectToTangent gives entity.y = entity.h directly.
        const camY = world.h + PLAYER_CENTER_Y + ORBIT_RADIUS * Math.sin(world.pitch);
        camera.position.set(0, camY, 0);
        camera.up.set(0, 1, 0);
        projectToTangent(
            world.u, world.v, world.h,
            cameraSurface.u, cameraSurface.v, cameraSurface.h,
            cameraSurface.beta,
            _playerTangentTmp
        );
        _lookTarget.set(
            _playerTangentTmp.x,
            _playerTangentTmp.y + PLAYER_CENTER_Y,
            _playerTangentTmp.z
        );
        camera.lookAt(_lookTarget);
    }

    function updateGroundUniforms() {
        const u = ground.material.uniforms;
        u.uCamU.value    = cameraSurface.u;
        u.uCamV.value    = cameraSurface.v;
        u.uCamBeta.value = cameraSurface.beta;
    }

    function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function render(world) {
        updateGroundUniforms();
        placeCamera(world);
        renderer.render(scene, camera);
    }

    return { scene, camera, renderer, ground, resize, render };
}

const entities = [];
const walkers = [];

const MAX_PREIMAGES = 40;
function maxPreimagesForR(r) {
    const C = 2 * Math.PI * r;
    const farLimit = (typeof intrinsicView !== 'undefined') ? intrinsicView.camera.far : 12000;
    return Math.min(MAX_PREIMAGES, Math.ceil(2 * farLimit / C) + 2);
}

function fitCloneCount(e, target) {
    const have = e.intrinsicCopies.length;
    if (target === have) return;
    if (target > have) {
        for (let i = have; i < target; i++) {
            const clone = e.intrinsicMesh.clone(true);
            clone.visible = false;
            e.intrinsicCopies.push(clone);
            intrinsicView.scene.add(clone);
        }
    } else {
        for (let i = have - 1; i >= target; i--) {
            intrinsicView.scene.remove(e.intrinsicCopies[i]);
        }
        e.intrinsicCopies.length = target;
    }
}

// Shadow ring: a flat disc that sits on the strip surface beneath an
// elevated entity in Mode A. Radius scales with the entity's h; color
// matches the height tint. Communicates "this entity is up high" without
// any spatial offset (which would snap at the wrap boundary).
function makeShadowRing() {
    const geo = new THREE.CircleGeometry(1, 24);
    geo.rotateX(-Math.PI / 2);   // disc lies in XZ plane, +Y is the disc normal
    const mat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide,
        depthWrite: false        // don't occlude the entity standing on it
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    return mesh;
}

function addEntity(e) {
    entities.push(e);
    if (e.kind === 'walker') walkers.push(e);
    e.intrinsicCopies = [e.intrinsicMesh];
    intrinsicView.scene.add(e.intrinsicMesh);
    fitCloneCount(e, maxPreimagesForR(R));
    extrinsicView.scene.add(e.extrinsicMesh);
    e._shadowRing = makeShadowRing();
    extrinsicView.scene.add(e._shadowRing);
}

// Player. Lives at strip-coords (world.u, world.v, world.beta, world.h).

{
    const playerUniforms = createEntityUniforms();
    addEntity({
        kind: 'player',
        intrinsicMesh: makePlayerMeshIntrinsic(),
        extrinsicMesh: makePlayerMeshExtrinsic((c) => embeddingMaterial(c, playerUniforms)),

        // world.u/v/h/beta are cover values directly (Fix B). The preimage
        // loop renders the player's cover-orbit (with mirroring on odd n)
        // and picks the closest one to the camera.
        get u()    { return world.u; },
        get v()    { return world.v; },
        get beta() { return world.beta; },
        get h()    { return world.h; }
    });
}

// Scratch.
const _entityPos = new THREE.Vector3();
const _ringPos = new THREE.Vector3();
const _ringNormal = new THREE.Vector3();
const _ringYAxis = new THREE.Vector3(0, 1, 0);

// Height tint ramp for Mode A. Teal at h=0 → amber at MAX_H/2 → red at MAX_H.
// Distinct from the strip's blue→red v-gradient (teal is greenish, strip blue
// is pure blue — won't be confused).
const MAX_H_FOR_TINT = 250;
const _heightTeal  = new THREE.Color(0x1d9e75);
const _heightAmber = new THREE.Color(0xef9f27);
const _heightRed   = new THREE.Color(0xe24b4a);
const _heightTmp   = new THREE.Color();
function computeHeightTint(t) {
    if (t < 0.5) return _heightTmp.copy(_heightTeal).lerp(_heightAmber, t * 2);
    return _heightTmp.copy(_heightAmber).lerp(_heightRed, (t - 0.5) * 2);
}

// Surface position + normal at canonical (u, v). Same math as the embedding
// vertex shader, used JS-side for shadow ring placement.
function embedSurfacePosAndNormal(u, v, posOut, normalOut) {
    const angle = u * 2 * Math.PI / L;
    const halfA = angle * 0.5;
    const cosU = Math.cos(angle), sinU = Math.sin(angle);
    const cosH = Math.cos(halfA), sinH = Math.sin(halfA);
    const rEff = R + v * cosH;
    posOut.set(rEff * cosU, v * sinH, rEff * sinU);
    const ddux = -rEff * sinU - 0.5 * v * sinH * cosU;
    const dduy =  0.5 * v * cosH;
    const dduz =  rEff * cosU - 0.5 * v * sinH * sinU;
    const ddvx = cosH * cosU;
    const ddvy = sinH;
    const ddvz = cosH * sinU;
    const nx = dduy * ddvz - dduz * ddvy;
    const ny = dduz * ddvx - ddux * ddvz;
    const nz = ddux * ddvy - dduy * ddvx;
    const nLen = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
    normalOut.set(nx / nLen, ny / nLen, nz / nLen);
}

function updateEntities(dt) {
    // Walkers walk along +u in cover. u is cumulative; wrap by 2L for float
    // hygiene only (the deck transform has period 2, so 2L preserves
    // orientation).
    for (const w of walkers) {
        w.u += w.speed * dt;
        const period = 2 * L;
        while (w.u >= period) w.u -= period;
        while (w.u < 0)        w.u += period;
    }

    // Camera-surface cover frame (already cover values directly).
    const csCovU    = cameraSurface.u;
    const csCovV    = cameraSurface.v;
    const csCovH    = cameraSurface.h;
    const csCovBeta = cameraSurface.beta;
    const farLimit  = intrinsicView.camera.far;

    for (const e of entities) {
        const eu = e.u, ev = e.v, eh = e.h, eb = e.beta || 0;
        const cap = e.intrinsicCopies.length;
        let copyIdx = 0;

        // Anchor preimage enumeration around the n that puts the entity
        // closest to the camera in cover. With the camera in cover at csCovU
        // and the entity's canonical at eu, the n-th preimage's u is
        // (eu + n·L); the closest one has n ≈ round((csCovU − eu) / L).
        // (Without anchoring, walking a single lap puts the closest preimage
        // at n=1 and our n=0,−1,1,−2,2 enumeration would skip past the
        // visible image.)
        const nCenter = Math.round((csCovU - eu) / L);

        // Enumerate nCenter, nCenter+1, nCenter-1, nCenter+2, nCenter-2, ...
        //
        // Preimage formula for the intrinsic view: (u + nL, (-1)^n v, h).
        // h is PRESERVED across preimages — the inhabitant's universe is the
        // trivial product M × ℝ where "up" is global. The (-h) in the formal
        // deck transform belongs to the EXTRINSIC embedding's coordinate
        // system, not to the inhabitant's experience. Without this, odd
        // preimage meshes would extend down through the strip and appear
        // "in the ground."
        for (let k = 0; k < cap + 4 && copyIdx < cap; k++) {
            const n = (k === 0) ? nCenter
                    : ((k % 2 === 1) ? (nCenter + ((k + 1) >> 1))
                                     : (nCenter - (k >> 1)));
            const sign = (((n % 2) + 2) % 2) === 0 ? 1 : -1;
            const preU = eu + n * L;
            const preV = sign * ev;
            // Mode A: preH = eh (h preserved). Mode B: preH = sign·eh
            // (h flips on odd preimages — twisted bundle).
            const preH = HEIGHT_TWIST ? (sign * eh) : eh;
            projectToTangent(preU, preV, preH, csCovU, csCovV, csCovH, csCovBeta, _entityPos);
            const x = _entityPos.x, y = _entityPos.y, z = _entityPos.z;
            const dist = Math.sqrt(x * x + z * z);
            if (dist > farLimit) continue;

            const c = e.intrinsicCopies[copyIdx++];
            c.visible = true;
            c.position.set(x, y, z);
            // Mesh bearing: the deck transform negates β each lap, so the
            // n-th preimage's bearing is sign·eb. Three.js Y-rotation that
            // takes mesh-local −Z to a cover-direction rotated by Δ is +Δ.
            const meshBetaCov = sign * eb;
            const relBeta = meshBetaCov - csCovBeta;
            c.rotation.set(0, relBeta, 0);
            // Mode A: only X mirrors (asymmetric features swap sides; mesh
            // stays upright). Mode B: X AND Y mirror (mesh flips upside-down,
            // matching the deck transform's full reflection).
            if (sign < 0) c.scale.set(-1, HEIGHT_TWIST ? -1 : 1, 1);
            else          c.scale.set( 1, 1, 1);
        }
        for (let i = copyIdx; i < e.intrinsicCopies.length; i++) {
            e.intrinsicCopies[i].visible = false;
        }

        // Extrinsic: deck-transform the entity into the canonical [0, L)
        // u-range so it sits on the single-cover ribbon mesh.
        //
        // The deck transform is orientation-reversing, so applying it on
        // the anchor alone (par·v, par·β, par·h) isn't enough — the mesh's
        // local x AND y axes have to be reflected too, otherwise the body
        // diverges from the anchor across the wrap. scale.set(-1, -1, 1)
        // on odd laps does that. With this scale + mode-dependent uObjH:
        //
        //   Mode B (HEIGHT_TWIST=true):  uObjH = par·h. (-h)·(-n) = h·n
        //     makes the embedded position continuous through the wrap for
        //     ALL h. Smooth jumps across the seam.
        //
        //   Mode A (HEIGHT_TWIST=false): uObjH = h. The mesh BODY is
        //     continuous at the seam when h=0 (grounded entities walking
        //     across the wrap don't snap). For h≠0 there's an unavoidable
        //     anchor snap of 2h — Mode A's identification doesn't flip h
        //     but the embedding normal does, and that's a real topological
        //     obstruction. The snap only manifests for entities at h>0
        //     CROSSING the seam (jumping players). Static elevated entities
        //     (smiley at h=180, platforms) live entirely in [0, L) and
        //     never trigger it.
        const u = e.entityUniforms;
        const lapCount = Math.floor(eu / L);
        const par = (((lapCount % 2) + 2) % 2) === 0 ? 1 : -1;
        u.uObjU.value    = eu - lapCount * L;
        u.uObjV.value    = par * ev;
        u.uObjBeta.value = par * eb;
        // Both modes use par·h. With the twisted ribbon embedding, this is
        // what makes the body continuous through the seam ((-h)·(-n)=h·n).
        // Mode A and Mode B are now mathematically identical here; the only
        // difference is the colorless tint applied below in Mode A.
        u.uObjH.value    = par * eh;
        // Both modes get scale(-1, -1, 1) on odd lap. With Mode B's par·h
        // on uObjH the position is continuous through the seam via the
        // (-h)·(-n)=h·n cancellation. With Mode A's plain h, the X+Y
        // mirror makes the body travel continuously to the other face
        // (no snap) — and the visible signature of "I'm on the other
        // sheet of the cover" is communicated by a colorless tint on
        // dynamic entities (player, walkers) on the odd lap. Static
        // entities (smiley, tree, pole, platforms, signpost) live in
        // [0, L) by construction and are always rendered colored.
        if (par < 0) e.extrinsicMesh.scale.set(-1, -1, 1);
        else         e.extrinsicMesh.scale.set( 1,  1, 1);

        // Mode A's "other realm" colorless tint. Only applied to dynamic
        // entities (player, walkers) when their cover-u places them on
        // the odd lap. Mode B's deck transform keeps everything coherent
        // in 3D, so no tint is needed there.
        const isDynamic = (e.kind === 'player' || e.kind === 'walker');
        if (!HEIGHT_TWIST && isDynamic && par < 0) {
            u.uTintAmount.value = 0.85;
            u.uTintColor.value.setHex(0x808080);
        } else {
            u.uTintAmount.value = 0;
        }
        e._shadowRing.visible = false;
    }
}
