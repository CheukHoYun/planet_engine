// ===== State snapshot (T key) =====
const snapshotEl     = document.getElementById('hudSnapshot');
const snapshotBodyEl = document.getElementById('snapshotBody');
function buildSnapshot() {
    const o   = extrinsicView.orbit;
    const cam = extrinsicView.camera;
    const f   = (x, n=3) => Number(x).toFixed(n);
    const v3  = (v) => `(${f(v.x)}, ${f(v.y)}, ${f(v.z)})`;
    const lines = [];
    lines.push(`R              = ${f(R, 2)}`);
    lines.push(`L              = ${f(L, 2)}    // 2πR`);
    lines.push(`W              = ${f(W, 2)}`);
    lines.push(`HEIGHT_TWIST   = ${HEIGHT_TWIST}    // ${HEIGHT_TWIST ? 'Mode B (twisted)' : 'Mode A (trivial)'}`);
    lines.push(``);
    lines.push(`// player (cover coords):`);
    lines.push(`world.u        = ${f(world.u, 3)}`);
    lines.push(`world.v        = ${f(world.v, 3)}`);
    lines.push(`world.beta     = ${f(world.beta, 4)}   // ${f(world.beta * 180/Math.PI, 2)}°`);
    lines.push(`world.h        = ${f(world.h, 2)}`);
    lines.push(`world.vh       = ${f(world.vh, 2)}`);
    lines.push(`world.grounded = ${world.grounded}`);
    lines.push(`world.pitch    = ${f(world.pitch, 4)}   // ${f(world.pitch * 180/Math.PI, 2)}°`);
    lines.push(`world.cameraAzim = ${f(world.cameraAzim, 4)}   // ${f(world.cameraAzim * 180/Math.PI, 2)}°`);
    lines.push(`ORBIT_RADIUS   = ${f(ORBIT_RADIUS, 2)}`);
    lines.push(``);
    lines.push(`// extrinsic camera orbit:`);
    lines.push(`orbit.azimuth   = ${f(o.azimuth, 4)}`);
    lines.push(`orbit.elevation = ${f(o.elevation, 4)}`);
    lines.push(`orbit.radius    = ${f(o.radius, 2)}`);
    lines.push(`orbit.target    = ${v3(o.target)}`);
    lines.push(`camera.position = ${v3(cam.position)}`);
    lines.push(`camera.near/far = ${f(cam.near, 2)} / ${f(cam.far, 2)}`);
    lines.push(``);
    lines.push(`// sliders:`);
    lines.push(`rSlider (L)     = ${rSlider.value}`);
    lines.push(`wSlider (W)     = ${wSlider.value}`);
    lines.push(`farSlider       = ${farSlider.value}    (intrinsic camera.far)`);
    return lines.join('\n');
}
function toggleSnapshot() {
    if (snapshotEl.style.display === 'none') {
        const txt = buildSnapshot();
        snapshotBodyEl.textContent = txt;
        snapshotEl.style.display = '';
        console.log('=== State snapshot ===\n' + txt);
    } else {
        snapshotEl.style.display = 'none';
    }
}

// ===== Sliders =====
const rSlider     = document.getElementById('rSlider');
const rValueEl    = document.getElementById('rValue');
const wSlider     = document.getElementById('wSlider');
const wValueEl    = document.getElementById('wValue');
const farSlider   = document.getElementById('farSlider');
const farValueEl  = document.getElementById('farValue');
rSlider.value = String(Math.round(L)); rValueEl.textContent = String(Math.round(L));
wSlider.value = String(W); wValueEl.textContent = String(Math.round(W));
farSlider.value = String(intrinsicView.camera.far);
farValueEl.textContent = String(Math.round(intrinsicView.camera.far));

function setR(newR) {
    const ratio = newR / R;
    R = newR;
    L = 2 * Math.PI * R;
    GLOBAL_R_UNIFORM.value = R;
    GLOBAL_L_UNIFORM.value = L;
    rValueEl.textContent = String(Math.round(L));
    // Keep cover-u proportional to circumference. Use period 2L (Fix B
    // hygiene window) for the player and walkers; static entities keep their
    // parity=+1 canonical [0, L).
    const period2 = 2 * L;
    world.u = ((world.u * ratio) % period2 + period2) % period2;
    for (const w of walkers) {
        w.u = ((w.u * ratio) % period2 + period2) % period2;
    }
    for (const e of entities) {
        if (e.kind === 'walker' || e.kind === 'player') continue;
        e.u = ((e.u * ratio) % L + L) % L;
    }
    updateRibbonGeometry(extrinsicView.ribbonGeo);
    updateEdgeBandGeometry(extrinsicView.edgeBandPos.geometry);
    updateEdgeBandGeometry(extrinsicView.edgeBandNeg.geometry);
    extrinsicView.orbit.radius = Math.max(R * 1.1, Math.min(R * 20, extrinsicView.orbit.radius * ratio));
    extrinsicView.camera.far = R * 60;
    extrinsicView.camera.updateProjectionMatrix();
    extrinsicView.applyOrbit();
    const target = maxPreimagesForR(R);
    for (const e of entities) fitCloneCount(e, target);
}
rSlider.addEventListener('input', () => {
    // Slider exposes L; convert to R (= L / 2π) before applying.
    const newL = parseFloat(rSlider.value);
    setR(newL / (2 * Math.PI));
});

function setW(newW) {
    W = newW;
    GLOBAL_W_UNIFORM.value = W;
    wValueEl.textContent = String(Math.round(W));
    // Clamp player v.
    if (world.v >  W) world.v =  W;
    if (world.v < -W) world.v = -W;
    updateRibbonGeometry(extrinsicView.ribbonGeo);
    updateEdgeBandGeometry(extrinsicView.edgeBandPos.geometry);
    updateEdgeBandGeometry(extrinsicView.edgeBandNeg.geometry);
}
wSlider.addEventListener('input', () => setW(parseFloat(wSlider.value)));

function setIntrinsicFar(newFar) {
    intrinsicView.camera.far = newFar;
    intrinsicView.camera.updateProjectionMatrix();
    farValueEl.textContent = String(Math.round(newFar));
    const target = maxPreimagesForR(R);
    for (const e of entities) fitCloneCount(e, target);
}
farSlider.addEventListener('input', () => setIntrinsicFar(parseFloat(farSlider.value)));

function setFarToLaps(laps) {
    const target = laps * L;
    const min = parseFloat(farSlider.min);
    const max = parseFloat(farSlider.max);
    const clamped = Math.max(min, Math.min(max, target));
    farSlider.value = String(clamped);
    setIntrinsicFar(clamped);
}
document.getElementById('farHalfBtn').addEventListener('click', () => setFarToLaps(0.5));
document.getElementById('farFullBtn').addEventListener('click', () => setFarToLaps(1.0));

const heightModeBtn = document.getElementById('heightModeBtn');
function refreshHeightModeBtn() {
    heightModeBtn.textContent = HEIGHT_TWIST ? 'twisted (Mode B)' : 'trivial (Mode A)';
}
heightModeBtn.addEventListener('click', () => {
    HEIGHT_TWIST = !HEIGHT_TWIST;
    refreshHeightModeBtn();
});
refreshHeightModeBtn();

// ===== Coords HUD =====
const coordsUEl    = document.getElementById('coordsU');
const coordsVEl    = document.getElementById('coordsV');
const coordsSideEl = document.getElementById('coordsSide');
function updateCoordsReadout() {
    // Cover-u modulo L tells you "where on the strip" you are; floor(u/L)
    // mod 2 tells you which lap-parity you're on (the "side" badge).
    const uMod = ((world.u % L) + L) % L;
    coordsUEl.textContent = uMod.toFixed(0);
    coordsVEl.textContent = world.v.toFixed(0);
    const lapEven = (Math.floor(world.u / L) & 1) === 0;
    if (lapEven) {
        coordsSideEl.textContent = 'side A';
        coordsSideEl.className = 'side A';
    } else {
        coordsSideEl.textContent = 'side B';
        coordsSideEl.className = 'side B';
    }
}

// Selection HUD.
const selectionPanelEl = document.getElementById('hudSelection');
const selectionLabelEl = document.getElementById('selectionLabel');
function entityLabel(e) {
    if (e.label) return e.label;
    return e.kind.charAt(0).toUpperCase() + e.kind.slice(1);
}
function refreshSelectionHUD() {
    const sel = extrinsicView.getSelection();
    if (!sel) {
        if (selectionPanelEl.style.display !== 'none') selectionPanelEl.style.display = 'none';
        return;
    }
    if (selectionPanelEl.style.display === 'none') selectionPanelEl.style.display = '';
    const label = entityLabel(sel.entity);
    if (selectionLabelEl.textContent !== label) selectionLabelEl.textContent = label;
}

// ===== Physics =====
//
// All quantities are in COVER directly. Gravity is −GRAVITY · dt on vh.
// Jumping sets vh = +JUMP_VEL. Ground at h=0; platforms at h>0.
// Platform-top height in cover for the n-th preimage (closest one to the
// player). Matches the rendering's preimage formula:
//   Mode A: preimage h is preserved → platTop = e.h + e.height for every n.
//   Mode B: preimage h flips on odd n. Even: e.h + e.height. Odd: the
//     mesh extends downward from -e.h, so its "top" (highest cover-h) is
//     at -e.h — below the strip if e.h > 0, so not landable.
// Returns null if the preimage isn't a valid landing surface (top ≤ 0).
function platformTopFor(e, sign) {
    if (HEIGHT_TWIST && sign < 0) {
        const top = -e.h;
        return (top > 0) ? top : null;
    }
    return e.h + e.height;
}

function findHighestGroundUnder() {
    let level = 0;
    for (const e of entities) {
        if (e.kind !== 'platform') continue;
        // Find the closest cover-image of the platform to the player.
        const duRaw = e.u - world.u;
        const nC = Math.round(duRaw / L);
        const sign = (((nC % 2) + 2) % 2) === 0 ? 1 : -1;
        const du = duRaw - nC * L;
        const dv = sign * e.v - world.v;
        if (du * du + dv * dv > e.footprintRadius * e.footprintRadius) continue;
        const platTop = platformTopFor(e, sign);
        if (platTop === null) continue;
        if (platTop > level && platTop <= world.h + 0.02) level = platTop;
    }
    return level;
}

function integrate(dt) {
    if (camAzimAccum !== 0) { world.cameraAzim += camAzimAccum; camAzimAccum = 0; }
    if (pitchAccum   !== 0) {
        world.pitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, world.pitch + pitchAccum));
        pitchAccum = 0;
    }

    // WASD: snap player to camera-relative direction, then walk forward.
    const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
    const moveZ = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
    if (moveX !== 0 || moveZ !== 0) {
        // Camera's cover-bearing (cameraSurface stores cover values directly).
        const csBeta = cameraSurface.beta;
        const cosCB = Math.cos(csBeta);
        const sinCB = Math.sin(csBeta);
        // forward_cov = (cosCB, sinCB); right_cov = (sinCB, -cosCB).
        // Move = (-moveZ)·forward + moveX·right.
        const dirU = -moveZ * cosCB + moveX * sinCB;
        const dirV = -moveZ * sinCB - moveX * cosCB;
        const dirLen = Math.sqrt(dirU * dirU + dirV * dirV);
        if (dirLen > 1e-6) {
            const newBeta = Math.atan2(dirV, dirU);
            const oldBeta = world.beta;
            world.beta = newBeta;
            // Keep camera world-bearing fixed across the snap.
            world.cameraAzim += (oldBeta - newBeta);
            world.u += WALK_SPEED * dt * Math.cos(world.beta);
            world.v += WALK_SPEED * dt * Math.sin(world.beta);
            normalize(world);
        }
    }

    // Vertical physics: cover gravity, ground/platform collision.
    const support = findHighestGroundUnder();
    if (world.grounded) {
        if (Math.abs(world.h - support) < 0.5) {
            world.h = support;
        } else {
            world.grounded = false;
        }
    }
    if (!world.grounded) {
        const prevH = world.h;
        world.vh -= GRAVITY * dt;
        world.h += world.vh * dt;
        let landAt = -Infinity;
        if (prevH >= 0 && world.h <= 0 && world.vh <= 0) landAt = 0;
        for (const e of entities) {
            if (e.kind !== 'platform') continue;
            const duRaw = e.u - world.u;
            const nC = Math.round(duRaw / L);
            const sign = (((nC % 2) + 2) % 2) === 0 ? 1 : -1;
            const du = duRaw - nC * L;
            const dv = sign * e.v - world.v;
            if (du * du + dv * dv > e.footprintRadius * e.footprintRadius) continue;
            const platTop = platformTopFor(e, sign);
            if (platTop === null) continue;
            if (prevH >= platTop - 0.01 && world.h <= platTop && world.vh <= 0) {
                if (platTop > landAt) landAt = platTop;
            }
        }
        if (landAt > -Infinity) {
            world.h = landAt;
            world.vh = 0;
            world.grounded = true;
        }
    }
}

// ===== Settings gear button =====
{
    const btn   = document.getElementById('settingsBtn');
    const panel = document.getElementById('hudSettings');
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        panel.classList.toggle('collapsed');
        btn.classList.toggle('active', !panel.classList.contains('collapsed'));
    });
    document.addEventListener('pointerdown', (e) => {
        if (panel.classList.contains('collapsed')) return;
        if (panel.contains(e.target) || btn.contains(e.target)) return;
        panel.classList.add('collapsed');
        btn.classList.remove('active');
    });
}

// ===== Fullscreen =====
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else                              document.exitFullscreen().catch(() => {});
});
document.addEventListener('fullscreenchange', () => { setTimeout(resizeAll, 0); });

// ===== Frame loop =====
let lastTime = performance.now();
function loop(now) {
    if (now === undefined) now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt > 0.05) dt = 0.05;
    integrate(dt);
    updateCameraSurface();
    updateEntities(dt);
    updateCoordsReadout();
    refreshSelectionHUD();
    intrinsicView.render(world);
    extrinsicView.render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
